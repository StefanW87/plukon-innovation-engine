// ── Tag component ──────────────────────────────────────────────────────────
function Tag({ label, selected, onClick, isFree }) {
  const isEngine = label && (label.includes("Engine") || label.includes("✨"));
  const free = isFree || isEngine;
  if (selected && free) return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:"20px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:"700",border:"1.5px solid "+O,background:O,color:"#fff",transition:"all 0.15s"}}>{label}</button>;
  if (selected)         return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:"20px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:"700",border:"1.5px solid "+G,background:G,color:"#fff",transition:"all 0.15s"}}>{label}</button>;
  if (free)             return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:"20px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:"500",border:"1.5px dashed #bbb",background:"#fff",color:"#888",fontStyle:"italic",transition:"all 0.15s"}}>{label}</button>;
  return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:"20px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:"500",border:"1.5px solid #ddd8d2",background:"#fff",color:"#444",transition:"all 0.15s"}}>{label}</button>;
}

// ── StepDot ────────────────────────────────────────────────────────────────
function StepDot({ steps, currentStep, completedSteps }) {
  return (
    <div style={{display:"flex",alignItems:"center",background:"#fff",borderBottom:"0.5px solid #e0dbd5",padding:"14px 20px",position:"sticky",top:"58px",zIndex:90}}>
      {steps.map((s,i) => {
        const done = completedSteps.includes(s.id), active = i===currentStep;
        return (
          <React.Fragment key={s.id}>

// ── RangeSlider (pointer events) ────────────────────────────────────────────
function RangeSlider({ label, min, max, step, valueMin, valueMax, onChange, unit }) {
  const trackRef = useRef(null);
  const dragging = useRef(null);
  const pct = (v) => ((v - min) / (max - min)) * 100;
  const snap = (v) => Math.round(v / step) * step;
  const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
  const valFromEvent = (e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return snap(min + clamp((clientX - rect.left) / rect.width, 0, 1) * (max - min));
  };
  const onPointerDown = (which) => (e) => {
    e.preventDefault(); dragging.current = which;
    const move = (ev) => {
      const v = valFromEvent(ev);
      if (dragging.current === "min" && v < valueMax) onChange(v, valueMax);
      if (dragging.current === "max" && v > valueMin) onChange(valueMin, v);
    };
    const up = () => { dragging.current = null; window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); window.removeEventListener("touchmove", move); window.removeEventListener("touchend", up); };
    window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, {passive:false}); window.addEventListener("touchend", up);
  };
  const minPct = pct(valueMin), maxPct = pct(valueMax);
  return (
    <div style={{marginBottom:"8px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <p style={{fontSize:"11px",fontWeight:"700",color:G,fontFamily:"'Nunito',sans-serif",letterSpacing:"0.07em",textTransform:"uppercase",margin:0}}>{label}</p>
        <span style={{fontSize:"14px",fontWeight:"800",color:G,fontFamily:"'Nunito',sans-serif",background:GL,padding:"3px 12px",borderRadius:"20px"}}>
          {unit==="€"?("€"+valueMin.toFixed(2)+" – €"+valueMax.toFixed(2)):(valueMin+unit+" – "+valueMax+unit)}
        </span>
      </div>
      <div ref={trackRef} style={{position:"relative",height:"6px",background:"#E0E0E0",borderRadius:"3px",margin:"16px 0 8px",cursor:"pointer"}}>
        <div style={{position:"absolute",left:(minPct+"%"),right:((100-maxPct)+"%"),height:"100%",background:G,borderRadius:"3px"}}/>
        <div onMouseDown={onPointerDown("min")} onTouchStart={onPointerDown("min")} style={{position:"absolute",left:(minPct+"%"),top:"50%",transform:"translate(-50%,-50%)",width:"22px",height:"22px",borderRadius:"50%",background:G,boxShadow:"0 2px 8px rgba(0,140,52,0.45)",cursor:"grab",zIndex:3,touchAction:"none"}}/>
        <div onMouseDown={onPointerDown("max")} onTouchStart={onPointerDown("max")} style={{position:"absolute",left:(maxPct+"%"),top:"50%",transform:"translate(-50%,-50%)",width:"22px",height:"22px",borderRadius:"50%",background:G,boxShadow:"0 2px 8px rgba(0,140,52,0.45)",cursor:"grab",zIndex:3,touchAction:"none"}}/>
      </div>
    </div>
  );
}

// ── ConceptCard ────────────────────────────────────────────────────────────
function parseConcept(concept, index, lang) {
  const lines = concept.split("\n").filter(Boolean);
  const titleLine = lines[0]?.replace(/^#+\s*/,"").replace(/\*\*/g,"") || ("Concept "+(index+1));
  const [titleName, tagline] = titleLine.includes(" — ") ? titleLine.split(" — ") : [titleLine,""];
  const sectionNames = lang==="en"
    ? ["Summary","Target consumer","Ingredients","Nutrition","Specs","Trends","Retail fit","Feasibility","Considerations","Market position"]
    : ["Samenvatting","Doelconsument","Ingrediënten","Nutritie","Specs","Trends","Retailfit","Haalbaarheid","Aandachtspunten","Marktpositie"];
  const allNames = [...sectionNames,"Samenvatting","Doelconsument","Ingrediënten","Nutritie","Specs","Trends","Retailfit","Haalbaarheid","Aandachtspunten","Marktpositie","Summary","Target consumer","Ingredients","Nutrition","Retail fit","Feasibility","Considerations","Market position"];
  const sections = {}; let cur=null, curLines=[];
  lines.slice(1).forEach(line => {
    const clean = line.replace(/\*\*/g,"").trim();
    if (allNames.includes(clean)) { if(cur) sections[cur]=curLines.join("\n").trim(); cur=clean; curLines=[]; }
    else if (cur) curLines.push(line);
  });
  if (cur) sections[cur]=curLines.join("\n").trim();
  const summary = Object.values(sections)[0] || "";
  const usps = summary.split(/\.\s+/).filter(s=>s.trim().length>10).slice(0,3).map(s=>s.replace(/\*\*/g,"").replace(/\.+$/,"").trim()+".");
  const specsText = sections["Specs"]||"";
  const nutriText = sections["Nutritie"]||sections["Nutrition"]||"";
  const grammage = specsText.match(/Grammage[:\s]+([^\n,]+)/i)?.[1]||"—";
  const prijs = specsText.match(/(€[\d,.]+\s*[–-]\s*€[\d,.]+|€[\d,.]+)/)?.[1]||"—";
  const eiwit = nutriText.match(/(?:Eiwit|Protein)[:\s]+([\d]+\s*g)/i)?.[1]||"—";
  const nutriscore = nutriText.match(/Nutriscore[:\s]+([A-E])/i)?.[1]||"—";
  const cleanTitle = titleName.replace(/[^a-zA-Z0-9 ]/g," ").trim().slice(0,50);
  const imgPrompt = encodeURIComponent(`professional food photography ${cleanTitle} fresh colorful ingredients white plate studio lighting top view`);
  const makeImgUrl = (seed) => `https://image.pollinations.ai/prompt/${imgPrompt}?width=600&height=400&nologo=true&seed=${seed}`;
  return { titleName, tagline, sections, sectionNames, usps, grammage, prijs, eiwit, nutriscore, makeImgUrl };
}

7. ${isEN?"No repetition across sections: each section adds NEW information only.":"Geen herhaling tussen secties: elke sectie voegt uitsluitend NIEUWE informatie toe."}
8. ${isEN?"Price sanity check: price-per-kg must be realistic for quality and portion. Family meal (4p, 800g+) minimum EUR7.50 mainstream.":"Prijs-sanity check: prijs-per-kg realistisch voor kwaliteit en portie. Gezinsmaaltijd (4p, 800g+) minimaal EUR7,50 mainstream."}
9. ${isEN?"PRODUCT NAME: Real retail-ready name, no jargon. Examples good: Mediterrane Kipsalade, Koreaanse Kipblokjes met Gochujang. Examples bad: Kippengehakt Steamerbowl, High Protein Convenience Meal.":"PRODUCTNAAM: Echte retailklare naam, geen vakjargon. Goede voorbeelden: Mediterrane Kipsalade, Koreaanse Kipblokjes met Gochujang. Slechte voorbeelden: Kippengehakt Steamerbowl, High Protein Convenience Meal."}
10. ${isEN?"TAGLINE: Max 5 words, consumer benefit or flavour promise. Good example: Vol smaak zo klaar. Bad example: Warm snel stevig.":"TAGLINE: Max 5 woorden, consumentvoordeel of smaakbelofte. Goed voorbeeld: Vol smaak zo klaar. Slecht voorbeeld: Warm snel stevig."}
11. ${isEN?"COMMERCIAL LOGIC: (a) No raw meat in RTE. (b) White spot claim must be realistic. (c) No healthy claim without Nutriscore A/B. (d) Every USP sentence must be a concrete consumer benefit, not a process description.":"COMMERCIELE LOGICA: (a) Geen rauw vlees in RTE. (b) White spot claim moet realistisch zijn. (c) Geen gezond zonder Nutriscore A/B. (d) Elke USP-zin is een concreet consumentvoordeel, geen procesbeschrijving."}`;
  };

  const generate = async () => {
    setPhase("generating"); setConcepts([]); setApiLog("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:5000,messages:[{role:"user",content:buildPrompt()}]})});
      const data = await res.json();
      if(!res.ok){setApiLog("API error ("+res.status+"): "+(data?.error?.message||JSON.stringify(data)));setPhase("results");return;}
      const text=(data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n");
      if(!text.trim()){setApiLog("Empty response");setPhase("results");return;}
      setConcepts(text.split(/\n(?=## )/).filter(p=>p.trim()));
    }catch(e){setApiLog("Error: "+e.message);}
    setPhase("results");
  };

              </div>

                          <button onClick={()=>set1("improveProductData",{...form.improveProductData,confirmed:true})} style={{padding:"8px 16px",background:form.improveProductData.confirmed?G:"#fff",color:form.improveProductData.confirmed?"#fff":G,border:"1.5px solid "+G,borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:"'Nunito',sans-serif"}}>

          {isImport && <ImportBlock/>}

          {isTasting && <TastingBlock/>}

      );

      case "retailer": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          <div>
            {sl(T("Retailer / Klant","Retailer / Customer",lang))}
            <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
              {RETAILERS.map(r=><Tag key={r} label={r} selected={form.retailer.includes(r)} onClick={()=>toggle("retailer",r)}/>)}

            </div>
          </div>
          <div>
            {sl(T("Land & Markt","Country & Market",lang))}
            {form.retailer.length>0&&COUNTRIES.length<(lang==="en"?COUNTRIES_EN:COUNTRIES_NL).length&&(
              <div style={{background:GL,borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",border:"1px solid "+G+"30"}}>
                <p style={{margin:0,fontSize:"12px",color:G,fontFamily:"'Nunito',sans-serif",fontWeight:"600"}}>💡 {T("Gefilterd op basis van geselecteerde retailers","Filtered based on selected retailers",lang)}</p>
              </div>
            )}
            <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
              {COUNTRIES.map(c=><Tag key={c} label={c} selected={form.country.includes(c)} onClick={()=>toggle("country",c)}/>)}
            </div>
          </div>
        </div>
      );

      case "trends": return (
        <div style={{display:"flex",flexDirection:"column",gap:"24px"}}>

            <>
              <div>
                {sl(T("🎯 Verbeterdoelen — wat wil je verbeteren?","🎯 Improvement goals — what do you want to improve?",lang))}

                {(lang==="en"?IMPROVE_GOALS_EN:IMPROVE_GOALS_NL).map(grp=>(
                  <div key={grp.group} style={{marginBottom:"16px"}}>
                    {sl2(grp.group)}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                      {grp.items.map(t=><Tag key={t} label={t} selected={form.improveGoals.includes(t)} onClick={()=>toggle("improveGoals",t)}/>)}
                    </div>
                  </div>
                ))}
                <Tag label={T("✨ Engine bepaalt prioriteit","✨ Engine determines priority",lang)} selected={form.improveGoals.includes("engine")} onClick={()=>toggle("improveGoals","engine")} isFree/>

              <div>
                {sl(T("🔒 Wat moet absoluut behouden blijven?","🔒 What must absolutely stay the same?",lang))}
                <textarea value={form.improveKeepWhat} onChange={e=>set1("improveKeepWhat",e.target.value)} placeholder={T("bijv. smaakprofiel, prijs onder €4,50, geen allergen wijzigingen, zelfde verpakking...","e.g. flavour profile, price under €4.50, no allergen changes, same packaging...",lang)} style={{width:"100%",minHeight:"80px",background:"#fff",border:"1.5px solid #ddd8d2",borderRadius:"10px",color:"#333",padding:"12px 14px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",resize:"vertical",outline:"none",lineHeight:"1.6",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor="#ddd8d2"}/>
              </div>
              <div>
                {sl(T("📏 Ambitieniveau","📏 Ambition level",lang))}
                <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                  {[
                    {id:"klein",nl:"Klein — 1 à 2 ingrediënten aanpassen",en:"Small — adjust 1 or 2 ingredients",dnl:"Minimale impact op receptuur en productie",den:"Minimal impact on recipe and production"},
                    {id:"midden",nl:"Middelgroot — significante receptuurwijziging",en:"Medium — significant recipe change",dnl:"Meerdere ingrediënten, mogelijk procesaanpassing",den:"Multiple ingredients, possible process adjustment"},
                    {id:"groot",nl:"Groot — volledig herontwikkelen binnen zelfde concept",en:"Large — fully redevelop within same concept",dnl:"Fundamentele aanpak, zelfde positionering",den:"Fundamental approach, same positioning"},
                  ].map(a=>(
                    <div key={a.id} onClick={()=>set1("improveAmbition",a.id)} style={{padding:"12px 16px",borderRadius:"10px",cursor:"pointer",border:"1.5px solid "+(form.improveAmbition===a.id?G:"#ddd8d2"),background:form.improveAmbition===a.id?GL:"#fff",transition:"all 0.15s"}}>
                      <div style={{fontWeight:"700",fontSize:"13px",color:form.improveAmbition===a.id?G:"#333",fontFamily:"'Nunito',sans-serif"}}>{lang==="en"?a.en:a.nl}</div>
                      <div style={{fontSize:"11px",color:"#888",marginTop:"2px",fontFamily:"'Nunito',sans-serif"}}>{lang==="en"?a.den:a.dnl}</div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          ) : (
            <>
              <div>
                {sl(T("Macro Trends — meerdere mogelijk","Macro Trends — multiple possible",lang))}

                  <div key={grp.group} style={{marginBottom:"16px"}}>
                    {sl2(grp.group)}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                      {grp.items.map(t=><Tag key={t} label={t} selected={form.trends.includes(t)} onClick={()=>toggle("trends",t)}/>)}
                    </div>
                  </div>
                ))}
                <Tag label={T("✨ Engine kiest","✨ Engine decides",lang)} selected={form.trends.includes("engine")} onClick={()=>toggle("trends","engine")} isFree/>
              </div>
              {/* Format — alleen voor convenience/complementaries nieuw concept */}
              {(isConv||isComp) && isNewConcept && (
                <div>
                  {sl(T("Productformat","Product Format",lang))}
                  <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                    {(isComp?FORMATS_COMP:FORMATS_CONV).map(f=><Tag key={f} label={f} selected={form.format.includes(f)} onClick={()=>toggle("format",f)}/>)}
                  </div>
                </div>
              )}
            </>
          )}

      case "ingredients": return (

                {tags(SNIT,"snit",false)}
              </div>
              <div>
                {sl(T("Bewerking","Processing",lang))}
                {tags(BEW,"bewerking",false)}
              </div>
              {showSmaak && (
                <div>
                  {sl(T("Smaakrichting","Flavour direction",lang))}
                  <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                    {SMAAK.map(s=><Tag key={s} label={s} selected={form.smaak.includes(s)} onClick={()=>toggle("smaak",s)}/>)}
                  </div>
                </div>
              )}
            </>
          )}

          {/* Route B */}
          {isGevogelte && isRouteB && (
            <>
              <div>
                {sl(T("Eiwitbasis","Protein base",lang))}
                {tags(EIWITB,"eiwitbasis",false)}

              </div>
              {/* Toevoegingen alleen tonen als relevant segment */}
              {(form.gevSegment.includes("Schnitzel")||form.gevSegment.includes("Nugget")||form.gevSegment.includes("Kipworst")||form.gevSegment.includes("cordon")||form.gevSegment.includes("Burger")) && (
                <div>
                  {sl(T("Toevoegingen","Additions",lang))}
                  <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                    {TOEV.map(t=><Tag key={t} label={t} selected={form.toevoegingen.includes(t)} onClick={()=>toggle("toevoegingen",t)}/>)}
                  </div>
                </div>
              )}
            </>
          )}

          {/* Convenience / Complementaries */}

                <div>

                    <div style={{marginTop:"10px",padding:"12px 14px",background:SAND,borderRadius:"8px"}}>

                    </div>

                </div>
              )}

                </div>

                  <div>
                    {sl(T("🥗 Dressing","🥗 Dressing",lang))}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                      {(lang==="en"?DRESSING_EN:DRESSING_NL).map(o=><Tag key={o.id} label={o.label} selected={form.sauce.includes(o.id)} onClick={()=>toggle("sauce",o.id)}/>)}
                    </div>
                  </div>
                );
                if (isPasta) return (
                  <div>
                    {sl(T("🍝 Saus","🍝 Sauce",lang))}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                      {(lang==="en"?PASTA_SAUS_EN:PASTA_SAUS_NL).map(o=><Tag key={o.id} label={o.label} selected={form.sauce.includes(o.id)} onClick={()=>toggle("sauce",o.id)}/>)}
                    </div>
                  </div>
                );
                if (isVrijSmaak) return (
                  <div>
                    {sl(T("🫙 Smaakmaker","🫙 Flavouring",lang))}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                      {(lang==="en"?VRIJE_SMAAKMAKER_EN:VRIJE_SMAAKMAKER_NL).map(o=><Tag key={o} label={o} selected={form.sauce.includes(o)} onClick={()=>toggle("sauce",o)}/>)}
                    </div>
                  </div>
                );
                return (
                  <div>
                    {sl(T("🫙 Saus","🫙 Sauce",lang))}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                      {(lang==="en"?SAUS_EN:SAUS_NL).map(o=><Tag key={o.id} label={o.label} selected={form.sauce.includes(o.id)} onClick={()=>toggle("sauce",o.id)}/>)}
                    </div>
                  </div>
                );
              })()}
            </>
          )}
        </div>
      );

      case "specs": return (
        <div style={{display:"flex",flexDirection:"column",gap:"24px"}}>
          <RangeSlider label={T("Grammage","Grammage",lang)} min={100} max={1500} step={25} valueMin={form.grammageMin} valueMax={form.grammageMax} onChange={(mn,mx)=>setForm(f=>({...f,grammageMin:mn,grammageMax:mx}))} unit="g"/>

            <div>
              {sl(T("⚖️ Grammage (vast kiezen)","⚖️ Grammage (fixed)",lang))}

                {getConvPresets().grammageOptions.map(g=><Tag key={g} label={g+"g"} selected={grammageFixed===g} onClick={()=>setGrammageFixed(grammageFixed===g?null:g)}/>)}

              {PERSONS.map(p=><Tag key={p} label={p} selected={form.persons===p} onClick={()=>set1("persons",p)}/>)}
            </div>
          </div>

          {/* Stukaantal — alleen gevogelte */}
          {isGevogelte && (
            <div>
              {sl(T("📦 Stukaantal / Verpakkingsformaat","📦 Piece count / Pack format",lang))}
              <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                {STUK.map(s=><Tag key={s} label={s} selected={form.stukaantal===s} onClick={()=>set1("stukaantal",s)}/>)}
              </div>
            </div>
          )}

          {/* Verpakking */}
          <div>
            {sl(T("📦 Verpakkingsvorm","📦 Packaging",lang))}
            <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
              {(isGevogelte?PKG_GEV:PKG_CONV).map(p=><Tag key={p} label={p} selected={form.packaging===p} onClick={()=>set1("packaging",p)}/>)}
            </div>
          </div>

          {/* Bereidingswijze — alleen gevogelte route B */}
          {isGevogelte && isRouteB && (
            <div>
              {sl(T("🍳 Bereidingswijze (consument)","🍳 Preparation method (consumer)",lang))}
              <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                {BER.map(b=><Tag key={b} label={b} selected={form.bereiding.includes(b)} onClick={()=>toggle("bereiding",b)}/>)}
              </div>
            </div>

          <div>
            {sl(T("📅 Houdbaarheid","📅 Shelf life",lang))}

          {/* Seizoen */}
          <div>
            {sl(T("🗓️ Seizoen","🗓️ Season",lang))}
            <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
              {SEAS.map(s=><Tag key={s} label={s} selected={form.season===s} onClick={()=>set1("season",s)}/>)}
            </div>
          </div>
        </div>
      );

      case "output": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          <RangeSlider label={T("💶 Consumentenprijs","💶 Consumer price",lang)} min={1.0} max={15.0} step={0.5} valueMin={form.priceMin} valueMax={form.priceMax} onChange={(mn,mx)=>setForm(f=>({...f,priceMin:mn,priceMax:mx}))} unit="€"/>

          <div>
            {sl(T("✅ Kwaliteitsniveau","✅ Quality level",lang))}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {QUALITY.map(q=>(
                <div key={q.id} onClick={()=>set1("quality",q.label)} style={{padding:"12px 16px",borderRadius:"10px",cursor:"pointer",border:"1.5px solid "+(form.quality===q.label?G:"#ddd8d2"),background:form.quality===q.label?GL:"#fff",transition:"all 0.15s"}}>
                  <div style={{fontWeight:"700",fontSize:"13px",color:form.quality===q.label?G:"#333",fontFamily:"'Nunito',sans-serif"}}>{q.label}</div>
                  <div style={{fontSize:"11px",color:"#888",marginTop:"2px",fontFamily:"'Nunito',sans-serif"}}>{q.desc}</div>
                </div>
              ))}
            </div>
          </div>

          <div>
            {sl(T("🥗 Nutritie & Claims","🥗 Nutrition & Claims",lang))}
            <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
              <div>
                <p style={{color:"#888",fontSize:"11px",fontWeight:"600",margin:"0 0 6px",fontFamily:"'Nunito',sans-serif"}}>Nutriscore doel</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                  {["A","B","C","D","E",T("Geen voorkeur","No preference",lang)].map(o=><Tag key={o} label={o} selected={form.nutriscore.includes(o)} onClick={()=>toggle("nutriscore",o)}/>)}
                </div>
              </div>
              {!isGevogelte && <>
                <div>
                  <p style={{color:"#888",fontSize:"11px",fontWeight:"600",margin:"0 0 6px",fontFamily:"'Nunito',sans-serif"}}>{T("Eiwitclaim","Protein claim",lang)}</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{PROT_LVL.map(o=><Tag key={o} label={o} selected={form.proteinLevel===o} onClick={()=>set1("proteinLevel",o)}/>)}</div>
                </div>
                <div>
                  <p style={{color:"#888",fontSize:"11px",fontWeight:"600",margin:"0 0 6px",fontFamily:"'Nunito',sans-serif"}}>{T("Vezelclaim","Fibre claim",lang)}</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{FIBER_LVL.map(o=><Tag key={o} label={o} selected={form.fiberLevel===o} onClick={()=>set1("fiberLevel",o)}/>)}</div>
                </div>
                <div>
                  <p style={{color:"#888",fontSize:"11px",fontWeight:"600",margin:"0 0 6px",fontFamily:"'Nunito',sans-serif"}}>{T("Groente hoeveelheid","Vegetable amount",lang)}</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{VEG.map(o=><Tag key={o} label={o} selected={form.vegGrams===o} onClick={()=>set1("vegGrams",o)}/>)}</div>
                </div>
              </>}
            </div>
          </div>

          <div>
            {sl(T("⚙️ Aantal ideeën","⚙️ Number of ideas",lang))}
            <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
              {(lang==="en"?OUTPUT_EN:OUTPUT_NL).map(o=><Tag key={o} label={o} selected={form.outputCount===o} onClick={()=>set1("outputCount",o)}/>)}
            </div>
          </div>

          <div>
            {sl(T("📝 Extra Briefing / Ideeën","📝 Additional Briefing / Ideas",lang))}
            <textarea value={form.brief} onChange={e=>set1("brief",e.target.value)} placeholder={T("Aanvullende eisen, ideeën, retailer specs, verboden ingrediënten, etc.","Additional requirements, ideas, retailer specs, forbidden ingredients, etc.",lang)} style={{width:"100%",minHeight:"100px",background:"#fff",border:"1.5px solid #ddd8d2",borderRadius:"10px",color:"#333",padding:"14px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",resize:"vertical",outline:"none",lineHeight:"1.6",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor="#ddd8d2"}/>
          </div>
        </div>
      );

      default: return null;
    }
  };

    [T("🐔 Categorie","🐔 Category",lang), form.category],
    [T("💡 Type","💡 Type",lang), form.conceptType==="line"?"Line Extension":form.conceptType==="improve"?T("Aanpassing bestaand product","Improve existing product",lang):"Nieuw Concept"],
    [T("🔧 Product","🔧 Product",lang), form.improveProductData?.naam||form.improveProductName],
    [T("🎯 Verbeterdoelen","🎯 Improvement goals",lang), form.improveGoals.join(", ")],
    [T("🔒 Behouden","🔒 Keep",lang), form.improveKeepWhat],
    [T("📏 Ambitie","📏 Ambition",lang), form.improveAmbition],
    [T("📂 Segment","📂 Segment",lang), form.gevSegment||form.convSegment||form.compSegment],
    [T("🗺️ Route","🗺️ Route",lang), isGevogelte?(form.gevRoute==="A"?T("A — Vers onbewerkt","A — Fresh unprocessed",lang):form.gevRoute==="B"?T("B — Bewerkt","B — Processed",lang):""):""],
    [T("🏪 Retailer","🏪 Retailer",lang), form.retailer.join(", ")],
    [T("🌍 Markt","🌍 Market",lang), form.country.join(", ")],
    [T("📈 Trends","📈 Trends",lang), form.trends.join(", ")],
    [T("🍽️ Format","🍽️ Format",lang), form.format.join(", ")],
    [T("✂️ Snit/vorm","✂️ Cut/form",lang), form.snit],
    [T("⚙️ Bewerking","⚙️ Processing",lang), form.bewerking],
    [T("🌶️ Smaakrichting","🌶️ Flavour",lang), [...(form.smaak||[]),...(form.smaakB||[])].join(", ")],
    [T("🐔 Eiwitbasis","🐔 Protein base",lang), form.eiwitbasis],
    [T("💪 Eiwit","💪 Protein",lang), form.protein.join(", ")],
    [T("🌾 Koolhydraat","🌾 Carbs",lang), form.carbs.join(", ")],
    [T("🫙 Saus","🫙 Sauce",lang), form.sauce.join(", ")],
    [T("📦 Verpakking","📦 Packaging",lang), form.packaging],
    [T("🔢 Stukaantal","🔢 Pack count",lang), form.stukaantal],
    [T("🍳 Bereiding","🍳 Preparation",lang), form.bereiding.join(", ")],
    [T("🏅 Keurmerk","🏅 Quality mark",lang), form.keurmerk],
    [T("📅 Houdbaarheid","📅 Shelf life",lang), form.shelfLife],
    [T("🗓️ Seizoen","🗓️ Season",lang), form.season],
    [T("✅ Kwaliteit","✅ Quality",lang), form.quality],
    [T("🥗 Nutriscore","🥗 Nutriscore",lang), form.nutriscore.join(", ")],
    [T("💪 Eiwitclaim","💪 Protein claim",lang), form.proteinLevel],
    [T("🌿 Vezelclaim","🌿 Fibre claim",lang), form.fiberLevel],
    [T("🥦 Groente","🥦 Vegetables",lang), form.vegGrams],
    [T("💶 Prijs","💶 Price",lang), ("€"+form.priceMin.toFixed(2)+" – €"+form.priceMax.toFixed(2))],
    [T("⚖️ Grammage","⚖️ Grammage",lang), grammageFixed?(grammageFixed+"g (vast)"):(form.grammageMin+"–"+form.grammageMax+"g")],
    [T("👥 Portie","👥 Portion",lang), form.persons],
    [T("⚙️ Aantal","⚙️ Count",lang), form.outputCount],
    [T("📝 Briefing","📝 Briefing",lang), form.brief],
  ].filter(([,v])=>v&&v.toString().trim());

  // ── Language select ───────────────────────────────────────────────────────
  if(!lang) return (
    <div style={{minHeight:"100vh",background:SAND,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{background:"#fff",borderRadius:"16px",padding:"48px 40px",maxWidth:"420px",width:"100%",boxShadow:"0 4px 24px rgba(0,0,0,0.08)",border:"0.5px solid #ddd8d2",textAlign:"center"}}>
        <div style={{width:"52px",height:"52px",borderRadius:"12px",background:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px",margin:"0 auto 20px"}}>⚡</div>
        <h1 style={{fontSize:"24px",fontWeight:"900",color:"#1a1a1a",fontFamily:"'Nunito',sans-serif",margin:"0 0 4px"}}>Innovation Engine</h1>
        <p style={{fontSize:"10px",color:"#aaa",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:"600",fontFamily:"'Nunito',sans-serif",margin:"0 0 36px"}}>Plukon Food Group · v4.0</p>
        <p style={{fontSize:"15px",color:"#555",fontFamily:"'Nunito',sans-serif",marginBottom:"24px",fontWeight:"600"}}>Kies je taal / Choose your language</p>
        <div style={{display:"flex",gap:"12px"}}>
          <button onClick={()=>setLang("nl")} style={{flex:1,padding:"18px",background:G,color:"#fff",border:"none",borderRadius:"12px",cursor:"pointer",fontSize:"16px",fontWeight:"900",fontFamily:"'Nunito',sans-serif"}}>Nederlands</button>
          <button onClick={()=>setLang("en")} style={{flex:1,padding:"18px",background:O,color:"#fff",border:"none",borderRadius:"12px",cursor:"pointer",fontSize:"16px",fontWeight:"900",fontFamily:"'Nunito',sans-serif"}}>English</button>
        </div>
      </div>
    </div>
  );

  if(!apiKey) return <ApiKeyScreen onSave={setApiKey} lang={lang}/>;

  return (
    <div style={{minHeight:"100vh",background:SAND,fontFamily:"'Nunito',sans-serif"}}>
      {/* Topbar */}
      <div style={{background:G,padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:"58px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"7px",background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px"}}>⚡</div>
          <div>
            <div style={{fontSize:"16px",fontWeight:"900",color:"#fff",fontFamily:"'Nunito',sans-serif"}}>
              Innovation Engine
              <span style={{fontSize:"10px",background:"rgba(255,255,255,0.18)",color:"rgba(255,255,255,0.9)",borderRadius:"4px",padding:"2px 6px",fontWeight:"600",marginLeft:"7px",verticalAlign:"1px"}}>v4.0</span>
            </div>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,0.6)",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:"600"}}>Plukon Food Group</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {phase!=="steps"&&<button onClick={reset} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.9)",padding:"5px 12px",borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontWeight:"700",fontFamily:"'Nunito',sans-serif"}}>{T("↩ Opnieuw","↩ Restart",lang)}</button>}
          <button onClick={()=>setLang("")} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.9)",padding:"5px 10px",borderRadius:"6px",cursor:"pointer",fontSize:"11px",fontWeight:"700",fontFamily:"'Nunito',sans-serif"}}>{lang==="en"?"EN":"NL"}</button>
          <button onClick={()=>{localStorage.removeItem("plukon_api_key");setApiKey("");}} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.9)",padding:"5px 10px",borderRadius:"6px",cursor:"pointer",fontSize:"11px",fontFamily:"'Nunito',sans-serif"}}>🔑</button>
        </div>
      </div>

      {phase==="steps"&&<StepDot steps={STEPS} currentStep={step} completedSteps={done}/>}

      <div style={{maxWidth:"820px",margin:"0 auto",padding:"28px 20px"}}>
        {phase==="steps"&&(
          <>
            <div style={{background:"#fff",borderRadius:"14px",padding:"24px",marginBottom:"16px",border:"0.5px solid #ddd8d2"}}>
              <div style={{marginBottom:"20px",paddingBottom:"16px",borderBottom:"1.5px solid "+(SAND)}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{width:"36px",height:"36px",borderRadius:"9px",background:OL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}}>{STEPS[step]?.icon}</div>
                  <h2 style={{margin:0,fontSize:"20px",fontWeight:"900",color:"#1a1a1a",fontFamily:"'Nunito',sans-serif"}}>{STEPS[step]?.label}</h2>
                </div>
              </div>
              {stepContent()}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{background:"#fff",border:"1.5px solid #ddd8d2",color:step===0?"#ccc":"#555",padding:"10px 22px",borderRadius:"8px",cursor:step===0?"default":"pointer",fontSize:"13px",fontWeight:"700",fontFamily:"'Nunito',sans-serif"}}>
                {T("← Vorige","← Previous",lang)}
              </button>
              <span style={{fontSize:"11px",color:"#aaa",fontFamily:"'Nunito',sans-serif"}}>{T("Stap","Step",lang)} {step+1} {T("van","of",lang)} {STEPS.length}</span>
              <button onClick={advance} style={{background:O,color:"#fff",border:"none",padding:"11px 26px",borderRadius:"8px",cursor:"pointer",fontSize:"14px",fontWeight:"900",fontFamily:"'Nunito',sans-serif"}}>
                {step<STEPS.length-1?T("Volgende →","Next →",lang):T("Naar overzicht →","To overview →",lang)}
              </button>
            </div>
          </>
        )}

        {phase==="summary"&&(
          <div style={{background:"#fff",borderRadius:"14px",padding:"28px",border:"0.5px solid #ddd8d2"}}>
            <h2 style={{margin:"0 0 4px",fontWeight:"900",fontSize:"22px",color:"#1a1a1a",fontFamily:"'Nunito',sans-serif"}}>{T("Briefing Overzicht","Briefing Overview",lang)}</h2>
            <div style={{height:"2px",background:"linear-gradient(90deg,"+O+","+G+",transparent)",borderRadius:"2px",marginBottom:"20px"}}/>
            {isConv&&isLineExt&&Object.keys(getConvPresets()).length>0&&(
              <div style={{background:GL,borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",border:"1px solid "+G+"30"}}>
                <p style={{margin:"0 0 4px",fontSize:"12px",fontWeight:"700",color:G,fontFamily:"'Nunito',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>✦ {T("Vaste parameters","Fixed parameters",lang)} — {form.convSegment}</p>
                <p style={{margin:0,fontSize:"12px",color:"#555",fontFamily:"'Nunito',sans-serif"}}>
                  Format: {getConvPresets().format} · {T("Verpakking","Packaging",lang)}: {getConvPresets().packaging} · Nutriscore: {getConvPresets().nutriscore?.join("/")}
                </p>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:"5px",marginBottom:"24px"}}>
              {summaryRows.map(([label,value])=>(
                <div key={label} style={{display:"flex",gap:"12px",padding:"8px 14px",background:SAND,borderRadius:"8px"}}>
                  <span style={{color:"#888",fontSize:"12px",minWidth:"130px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>{label}</span>
                  <span style={{color:"#333",fontSize:"12px",fontWeight:"600",flex:1,fontFamily:"'Nunito',sans-serif"}}>{value}</span>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
              <button onClick={generate} style={{background:G,color:"#fff",border:"none",padding:"13px 26px",borderRadius:"8px",cursor:"pointer",fontSize:"14px",fontWeight:"900",fontFamily:"'Nunito',sans-serif"}}>
                ⚡ {T("Genereer Ideeën","Generate Ideas",lang)}
              </button>
              <button onClick={()=>{setPhase("steps");setStep(STEPS.length-1);}} style={{background:"#fff",border:"1.5px solid #ddd8d2",color:"#555",padding:"13px 18px",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>
                {T("← Aanpassen","← Adjust",lang)}
              </button>
            </div>
          </div>
        )}

        {phase==="generating"&&(
          <div style={{background:"#fff",borderRadius:"14px",padding:"56px 40px",textAlign:"center",border:"0.5px solid #ddd8d2"}}>
            <div style={{position:"relative",width:"80px",height:"80px",margin:"0 auto 28px"}}>
              <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"3px solid "+GL,borderTop:"3px solid "+(G),animation:"spin 1.2s linear infinite"}}/>
              <div style={{position:"absolute",inset:"10px",borderRadius:"50%",border:"3px solid "+OL,borderBottom:"3px solid "+(O),animation:"spin 0.8s linear infinite reverse"}}/>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px"}}>⚡</div>
            </div>
            <h2 style={{fontWeight:"900",fontSize:"22px",color:"#1a1a1a",margin:"0 0 24px",fontFamily:"'Nunito',sans-serif"}}>{T("De Engine werkt aan je ideeën...","The Engine is working on your ideas...",lang)}</h2>
            <div style={{height:"4px",background:SAND,borderRadius:"2px",overflow:"hidden",maxWidth:"320px",margin:"0 auto"}}>
              <div style={{height:"100%",width:"40%",background:"linear-gradient(90deg,"+G+","+O+")",borderRadius:"2px",animation:"slide 1.8s ease-in-out infinite"}}/>
            </div>
          </div>
        )}

        {phase==="results"&&(
          <>
            <div style={{marginBottom:"24px"}}>
              <h2 style={{fontWeight:"900",fontSize:"26px",color:"#1a1a1a",margin:"0 0 4px",fontFamily:"'Nunito',sans-serif"}}>
                {concepts.length>0?(concepts.length+" "+T("Productideeën","Product ideas",lang)):T("Generatie voltooid","Generation complete",lang)}
              </h2>
              <p style={{color:"#888",fontSize:"13px",fontFamily:"'Nunito',sans-serif"}}>
                {[form.category,form.gevSegment||form.convSegment||form.compSegment,...form.retailer,...form.country].filter(Boolean).join(" · ")||"Plukon NPD 2026"}
              </p>
            </div>
            {apiLog&&<div style={{background:OL,border:"1px solid "+O,borderRadius:"10px",padding:"14px 16px",marginBottom:"20px"}}><p style={{margin:"0 0 4px",fontSize:"12px",fontWeight:"800",color:O,fontFamily:"'Nunito',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>⚠ Debug</p><p style={{margin:0,fontSize:"12px",color:"#555",fontFamily:"monospace",whiteSpace:"pre-wrap"}}>{apiLog}</p></div>}
            {concepts.map((c,i)=><ConceptCard key={i} concept={c} index={i} lang={lang}
              saved={savedConcepts.includes(c)}
              onSave={(c)=>setSavedConcepts(prev=>prev.includes(c)?prev:[...prev,c])}
              developing={developPhase==="generating"}
              onDevelop={developConceptFurther}
            />)}
            {savedConcepts.length>0 && (
              <div style={{background:"#fff",borderRadius:"14px",padding:"20px",border:"1.5px solid "+G,marginTop:"8px"}}>
                <p style={{margin:"0 0 12px",fontSize:"13px",fontWeight:"900",color:G,fontFamily:"'Nunito',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>{"💾 "+T("Opgeslagen concepten","Saved concepts",lang)+" ("+savedConcepts.length+")"}</p>
                {savedConcepts.map((c,i)=>{
                  const title = c.split("\n")[0].replace(/^#+\s*/,"").replace(/\*\*/g,"").split(" — ")[0];
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:SAND,borderRadius:"8px",marginBottom:"6px"}}>
                      <span style={{fontSize:"13px",fontWeight:"600",color:"#333",fontFamily:"'Nunito',sans-serif"}}>{title}</span>
                      <button onClick={()=>setSavedConcepts(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:"16px",padding:"0 4px"}}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginTop:"8px"}}>
              {concepts.length>0&&<button onClick={generate} style={{background:"#fff",border:"1.5px solid "+G,color:G,padding:"11px 20px",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:"'Nunito',sans-serif"}}>⟳ {T("Nieuwe variatie","New variation",lang)}</button>}
              <button onClick={()=>setPhase("summary")} style={{background:"#fff",border:"1.5px solid #ddd8d2",color:"#555",padding:"11px 20px",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>{T("← Briefing aanpassen","← Adjust briefing",lang)}</button>
              <button onClick={reset} style={{background:"#fff",border:"1.5px solid #ddd8d2",color:"#999",padding:"11px 20px",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>{T("Nieuwe briefing","New briefing",lang)}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<InnovationEngine/>);
</script>
</body>
</html>
