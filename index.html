function StepDot({ steps, currentStep, completedSteps }) {
  return (

      {steps.map((s,i) => {
        const done = completedSteps.includes(s.id), active = i===currentStep;
        return (
          <div key={s.id} style={{ display:"flex", alignItems:"center", gap:"4px" }}>
            <div style={{ width:"30px", height:"30px", borderRadius:"50%", background:done?G:active?OL:"#F5F5F5", border:`2px solid ${done?G:active?O:"#E0E0E0"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"11px", color:done?"#fff":active?O:"#9E9E9E", fontWeight:"800", transition:"all 0.2s", boxShadow:active?`0 0 0 3px ${OL}`:"none" }}>{done?"✓":i+1}</div>
            {i<steps.length-1 && <div style={{ width:"14px", height:"2px", background:done?GM:"#E0E0E0", borderRadius:"1px" }}/>}
          </div>
        );
      })}
    </div>
  );
}

function RangeSlider({ label, min, max, step, valueMin, valueMax, onChange, unit }) {
  const pct = (v) => ((v - min) / (max - min)) * 100;
  return (
    <div style={{ marginBottom:"8px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
        <p style={{ fontSize:"12px", fontWeight:"800", color:G, fontFamily:"'Nunito',sans-serif", letterSpacing:"0.06em", textTransform:"uppercase", margin:0 }}>{label}</p>
        <span style={{ fontSize:"14px", fontWeight:"900", color:G, fontFamily:"'Nunito',sans-serif", background:GL, padding:"4px 12px", borderRadius:"20px" }}>
          {unit==="€" ? `€${valueMin.toFixed(2)} – €${valueMax.toFixed(2)}` : `${valueMin}${unit} – ${valueMax}${unit}`}
        </span>
      </div>
      <div style={{ position:"relative", height:"6px", background:"#E0E0E0", borderRadius:"3px", margin:"16px 0" }}>
        <div style={{ position:"absolute", left:`${pct(valueMin)}%`, right:`${100-pct(valueMax)}%`, height:"100%", background:G, borderRadius:"3px" }}/>
        <input type="range" min={min} max={max} step={step} value={valueMin}
          onChange={e=>{ const v=parseFloat(e.target.value); if(v<=valueMax-step) onChange(v, valueMax); }}
          style={{ position:"absolute", top:"-8px", width:"100%", height:"22px", opacity:0, cursor:"pointer", zIndex: valueMin > max - (max-min)*0.1 ? 5 : 3, margin:0 }}/>
        <input type="range" min={min} max={max} step={step} value={valueMax}
          onChange={e=>{ const v=parseFloat(e.target.value); if(v>=valueMin+step) onChange(valueMin, v); }}
          style={{ position:"absolute", top:"-8px", width:"100%", height:"22px", opacity:0, cursor:"pointer", zIndex:4, margin:0 }}/>
        <div style={{ position:"absolute", left:`${pct(valueMin)}%`, top:"50%", transform:"translate(-50%,-50%)", width:"20px", height:"20px", borderRadius:"50%", background:G, boxShadow:"0 2px 6px rgba(46,125,50,0.4)", pointerEvents:"none" }}/>
        <div style={{ position:"absolute", left:`${pct(valueMax)}%`, top:"50%", transform:"translate(-50%,-50%)", width:"20px", height:"20px", borderRadius:"50%", background:G, boxShadow:"0 2px 6px rgba(46,125,50,0.4)", pointerEvents:"none" }}/>
      </div>
    </div>
  );
}

function parseConcept(concept, index, lang) {
  const lines = concept.split("\n").filter(Boolean);
  const titleLine = lines[0]?.replace(/^#+\s*/,"").replace(/\*\*/g,"") || `Concept ${index+1}`;
  const [titleName, tagline] = titleLine.includes(" — ") ? titleLine.split(" — ") : [titleLine,""];
  const sectionNames = lang==="en"
    ? ["Summary","Target consumer","Ingredients","Nutrition","Specs","Trends","Retail fit","Feasibility","Considerations","Market position"]
    : ["Samenvatting","Doelconsument","Ingrediënten","Nutritie","Specs","Trends","Retailfit","Haalbaarheid","Aandachtspunten","Marktpositie"];
  const allNames = [...sectionNames,"Samenvatting","Doelconsument","Ingrediënten","Nutritie","Specs","Trends","Retailfit","Haalbaarheid","Aandachtspunten","Marktpositie","Summary","Target consumer","Ingredients","Nutrition","Retail fit","Feasibility","Considerations","Market position"];
  const sections = {};
  let cur=null, curLines=[];
  lines.slice(1).forEach(line => {
    const clean = line.replace(/\*\*/g,"").trim();
    if (allNames.includes(clean)) { if(cur) sections[cur]=curLines.join("\n").trim(); cur=clean; curLines=[]; }
    else if (cur) curLines.push(line);
  });
  if (cur) sections[cur]=curLines.join("\n").trim();
  const summary = Object.values(sections)[0] || "";
  const usps = summary.split(/\.\s+/).filter(s=>s.trim().length>10).slice(0,3).map(s=>s.replace(/\*\*/g,"").trim()+".");
  const extract = (text,rx) => text?.match(rx)?.[1]||"—";
  const specsText = sections["Specs"]||"";
  const nutriText = sections["Nutritie"]||sections["Nutrition"]||"";
  const grammage = extract(specsText,/Grammage[:\s]+([^\n,]+)/i);
  const prijs    = extract(specsText,/(€[\d,.]+\s*[–-]\s*€[\d,.]+|€[\d,.]+)/);
  const houd     = extract(specsText,/(Houdbaarheid|Shelf life)[:\s]+([^\n]+)/i)||specsText.match(/(Vers|Fresh|Ultra|Hybrid|Ambient)[^\n,]*/i)?.[0]||"—";
  const eiwit    = extract(nutriText,/(?:Eiwit|Protein)[:\s]+([\d]+\s*g)/i);
  const nutriscore = nutriText.match(/Nutriscore[:\s]+([A-E])/i)?.[1]||"—";
  const cleanTitle = titleName.replace(/[^a-zA-Z0-9 ]/g," ").trim().slice(0,50);
  const imgPrompt = encodeURIComponent(`professional food photography ${cleanTitle} fresh colorful ingredients white plate studio lighting top view`);
  const imgUrl = `https://image.pollinations.ai/prompt/${imgPrompt}?width=600&height=400&nologo=true&seed=${(index+1)*9999}`;
  return { titleName, tagline, sections, sectionNames, usps, grammage, prijs, houdbaarheid:houd, eiwit, nutriscore, imgUrl };
}

function ConceptCard({ concept, index, lang }) {

    if (!text) return <p style={{color:"#ccc",fontSize:"12px",fontStyle:"italic",fontFamily:"'Nunito',sans-serif"}}>—</p>;
    return text.split("\n").map((line,i)=>{
      if(!line.trim()) return null;
      const isBullet = line.trim().startsWith("-")||line.trim().startsWith("•");
      const clean = line.replace(/^[-•]\s*/,"").replace(/\*\*/g,"").trim();
      if(!clean) return null;
      return <p key={i} style={{margin:"3px 0",fontSize:"13px",fontFamily:"'Nunito',sans-serif",color:"#444",lineHeight:"1.65",paddingLeft:isBullet?"14px":"0"}}>{isBullet?`• ${clean}`:clean}</p>;

        <img src={p.imgUrl} alt={p.titleName} onLoad={()=>setImgLoaded(true)} onError={()=>setImgError(true)} style={{width:"100%",height:"100%",objectFit:"cover",opacity:imgLoaded?1:0,transition:"opacity 0.6s"}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,rgba(0,0,0,0.65) 100%)"}}/>
        <div style={{position:"absolute",top:"14px",left:"14px",display:"flex",gap:"8px"}}>
          <span style={{background:O,color:"#fff",borderRadius:"8px",padding:"4px 12px",fontSize:"12px",fontWeight:"900",fontFamily:"'Nunito',sans-serif"}}>NPC {String(index+1).padStart(2,"0")}</span>
          {p.nutriscore!=="—"&&<span style={{background:{A:"#00843D",B:"#85BB2F",C:"#FFCC00",D:"#FF6600",E:"#E63312"}[p.nutriscore]||"#999",color:p.nutriscore==="C"?"#333":"#fff",borderRadius:"8px",padding:"4px 10px",fontSize:"11px",fontWeight:"800",fontFamily:"'Nunito',sans-serif"}}>NUTRI-SCORE {p.nutriscore}</span>}
        </div>

          <h3 style={{color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:"900",fontSize:"20px",margin:"0 0 3px",textShadow:"0 2px 6px rgba(0,0,0,0.4)"}}>{p.titleName}</h3>

function InnovationEngine() {
  const [lang, setLang]       = useState("");
  const [apiKey, setApiKey]   = useState(()=>localStorage.getItem("plukon_api_key")||"");
  const [step, setStep]       = useState(0);
  const [done, setDone]       = useState([]);
  const [phase, setPhase]     = useState("steps");
  const [concepts, setConcepts] = useState([]);
  const [apiLog, setApiLog]   = useState("");

  const [form, setForm] = useState({
    conceptType:"", category:"", lineExtSegment:"",
    retailer:[], country:[],
    trends:[], format:[],
    protein:[], carbs:[], sauce:[],
    packaging:"", season:"",
    quality:"", nutriscore:[], proteinLevel:"", vegShare:"",
    priceMin:3.0, priceMax:6.5, grammageMin:200, grammageMax:500,
    persons:"", shelfLife:"", outputCount:"", brief:"",
  });

  const STEPS = lang==="en" ? STEPS_EN : STEPS_NL;
  const isLineExt = form.conceptType==="line";
  const lineExtSteps = lang==="en"
    ? [{id:"type",label:"Type & Category",icon:"💡"},{id:"retailer",label:"Retailer & Market",icon:"🏪"},{id:"trends",label:"Trends & Ingredients",icon:"📈"},{id:"output",label:"Output & Briefing",icon:"⚙️"}]
    : [{id:"type",label:"Type & Categorie",icon:"💡"},{id:"retailer",label:"Retailer & Markt",icon:"🏪"},{id:"trends",label:"Trends & Ingrediënten",icon:"📈"},{id:"output",label:"Output & Briefing",icon:"⚙️"}];
  const activeSteps = isLineExt ? lineExtSteps : STEPS;

  const toggle = (field, val) => setForm(f=>({...f,[field]:f[field].includes(val)?f[field].filter(v=>v!==val):[...f[field],val]}));
  const set1   = (field, val) => setForm(f=>({...f,[field]:val}));

  const getAvailableCountries = () => {
    if(form.retailer.length===0) return lang==="en"?COUNTRIES_EN:COUNTRIES_NL;
    const allowed = new Set();
    form.retailer.forEach(r=>{
      const countries = RETAILER_COUNTRIES[r]||[];
      countries.forEach(c=>allowed.add(c));
    });
    const allCountries = COUNTRIES_NL;
    const filtered = allCountries.filter(c=>allowed.has(c));
    if(lang==="en") return filtered.map(c=>COUNTRY_MAP[c]||c);
    return filtered;
  };

  const getPresets = () => {
    const seg = form.lineExtSegment;
    return LINE_EXT_PRESETS[seg] || {};
  };

  const advance = () => {
    const id = activeSteps[step].id;
    setDone(d=>d.includes(id)?d:[...d,id]);
    if(step<activeSteps.length-1) setStep(s=>s+1); else setPhase("summary");
  };

  const reset = () => {
    setStep(0); setDone([]); setConcepts([]); setPhase("steps"); setApiLog(""); setLang("");
    setForm({conceptType:"",category:"",lineExtSegment:"",retailer:[],country:[],trends:[],format:[],protein:[],carbs:[],sauce:[],packaging:"",season:"",quality:"",nutriscore:[],proteinLevel:"",vegShare:"",priceMin:3.0,priceMax:6.5,grammageMin:200,grammageMax:500,persons:"",shelfLife:"",outputCount:"",brief:""});

  };

                    {form.category===cat.id&&<span style={{marginLeft:"auto",color:G}}>✓</span>}
                  </div>
                  {form.conceptType==="line"&&form.category===cat.id&&cat.id!=="combi"&&(
                    <div style={{padding:"12px 14px",background:"#FAFAFA",borderRadius:"8px",border:"1px solid #E8F5E9",marginTop:"6px"}}>
                      <p style={{fontSize:"11px",fontWeight:"800",color:G,textTransform:"uppercase",letterSpacing:"0.06em",margin:"0 0 8px",fontFamily:"'Nunito',sans-serif"}}>{T("Kies segment","Select segment",lang)}</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                        {(LINE_EXT[cat.id]||[]).map(seg=>(
                          <button key={seg} onClick={()=>set1("lineExtSegment",seg)} style={{padding:"7px 14px",borderRadius:"20px",border:`2px solid ${form.lineExtSegment===seg?G:"#C8E6C9"}`,background:form.lineExtSegment===seg?G:"#fff",color:form.lineExtSegment===seg?"#fff":"#388E3C",fontSize:"13px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:form.lineExtSegment===seg?"700":"500"}}>{seg}</button>
                        ))}
                      </div>
                    </div>

                </div>
              ))}
            </div>
          </div>
        </div>
      );

      case "retailer": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("Retailer / Klant","Retailer / Customer",lang)}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {RETAILERS.map(r=><Tag key={r} label={r} selected={form.retailer.includes(r)} onClick={()=>toggle("retailer",r)}/>)}
              <Tag label={T("Anders / Vrij","Other / Free",lang)} selected={form.retailer.includes("Anders")} onClick={()=>toggle("retailer","Anders")}/>
            </div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("Land & Markt","Country & Market",lang)}</p>
            {form.retailer.length>0&&COUNTRIES.length<(lang==="en"?COUNTRIES_EN:COUNTRIES_NL).length&&(
              <div style={{background:GL,borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",border:"1px solid #C8E6C9"}}>
                <p style={{margin:0,fontSize:"12px",color:G,fontFamily:"'Nunito',sans-serif",fontWeight:"600"}}>💡 {T("Gefilterd op basis van geselecteerde retailers","Filtered based on selected retailers",lang)}</p>
              </div>
            )}
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {COUNTRIES.map(c=><Tag key={c} label={c} selected={form.country.includes(c)} onClick={()=>toggle("country",c)}/>)}
            </div>
          </div>
        </div>
      );

      case "trends": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("Macro Trends","Macro Trends",lang)} <span style={{color:"#aaa",fontWeight:"500",textTransform:"none",fontSize:"11px"}}>{T("— meerdere mogelijk","— multiple possible",lang)}</span></p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {TRENDS.map(t=><Tag key={t} label={t} selected={form.trends.includes(t)} onClick={()=>toggle("trends",t)}/>)}
            </div>
          </div>
          {!isLineExt&&(
            <div>
              <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("Productformat","Product Format",lang)}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {FORMATS.map(f=><Tag key={f} label={f} selected={form.format.includes(f)} onClick={()=>toggle("format",f)}/>)}
              </div>
            </div>
          )}
          {isLineExt&&(
            <div>
              <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("Ingrediënten richting","Ingredient direction",lang)}</p>
              <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
                {[[T("💪 Eiwitbron","💪 Protein source",lang),"protein",PROTEIN],[T("🌾 Koolhydraat","🌾 Carbohydrate",lang),"carbs",CARBS],[T("🫙 Saus / Dressing","🫙 Sauce / Dressing",lang),"sauce",SAUCES]].map(([lbl,field,opts])=>(
                  <div key={field}>
                    <p style={{color:"#888",fontSize:"11px",fontWeight:"700",margin:"0 0 6px",fontFamily:"'Nunito',sans-serif"}}>{lbl}</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{opts.map(o=><Tag key={o.id} label={o.label} selected={form[field].includes(o.id)} onClick={()=>toggle(field,o.id)}/>)}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );

      case "ingredients": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          {/* Protein - hide for gevogelte and complementaries uses only plant-based */}
          {!isGevogelte && (
            <div>
              <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("💪 Eiwitbron","💪 Protein source",lang)}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {(isComp
                  ? (lang==="en"?[{label:"🌱 Alternative protein",id:"alt"}]:[{label:"🌱 Alternatief eiwit",id:"alt"}])
                  : PROTEIN
                ).map(o=><Tag key={o.id} label={o.label} selected={form.protein.includes(o.id)} onClick={()=>toggle("protein",o.id)}/>)}
              </div>
            </div>
          )}
          {/* Carbs - hide for gevogelte and complementaries */}
          {!isGevogelte && !isComp && (
            <div>
              <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("🌾 Koolhydraat component","🌾 Carbohydrate",lang)}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{CARBS.map(o=><Tag key={o.id} label={o.label} selected={form.carbs.includes(o.id)} onClick={()=>toggle("carbs",o.id)}/>)}</div>
            </div>
          )}
          {/* Sauce - hide for complementaries, show for all others */}
          {!isComp && (
            <div>
              <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("🫙 Saus / Dressing","🫙 Sauce / Dressing",lang)}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{SAUCES.map(o=><Tag key={o.id} label={o.label} selected={form.sauce.includes(o.id)} onClick={()=>toggle("sauce",o.id)}/>)}</div>
            </div>
          )}
          {/* Marinade - separate for gevogelte */}
          {isGevogelte && (
            <div>
              <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("🫙 Marinade","🫙 Marinade",lang)}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {[T("Kruidenmarinade","Herb marinade",lang),T("Knoflook","Garlic",lang),T("Teriyaki","Teriyaki",lang),T("Harissa","Harissa",lang),T("Peri-Peri","Peri-Peri",lang),T("BBQ","BBQ",lang),T("Honing-mosterd","Honey mustard",lang),T("Citroen-kruid","Lemon herb",lang),T("Engine kiest","Engine decides",lang)].map(m=>(
                  <Tag key={m} label={m} selected={form.sauce.includes(m)} onClick={()=>toggle("sauce",m)}/>
                ))}
              </div>
            </div>
          )}
        </div>
      );

      case "specs": return (
        <div style={{display:"flex",flexDirection:"column",gap:"24px"}}>
          <RangeSlider label={T("Consumentenprijs","Consumer price",lang)} min={1.0} max={15.0} step={0.5} valueMin={form.priceMin} valueMax={form.priceMax} onChange={(min,max)=>setForm(f=>({...f,priceMin:min,priceMax:max}))} unit="€" lang={lang}/>
          <RangeSlider label={T("Grammage","Grammage",lang)} min={100} max={800} step={25} valueMin={form.grammageMin} valueMax={form.grammageMax} onChange={(min,max)=>setForm(f=>({...f,grammageMin:min,grammageMax:max}))} unit="g" lang={lang}/>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("👥 Portie / Personen","👥 Portion / Persons",lang)}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{PERSONS.map(p=><button key={p} onClick={()=>set1("persons",p)} style={{padding:"7px 14px",borderRadius:"20px",border:`2px solid ${form.persons===p?G:"#C8E6C9"}`,background:form.persons===p?G:"#fff",color:form.persons===p?"#fff":"#388E3C",fontSize:"13px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:form.persons===p?"700":"500"}}>{p}</button>)}</div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("📅 Houdbaarheid","📅 Shelf life",lang)}</p>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>{SHELF.map(s=>(
              <div key={s.id} onClick={()=>set1("shelfLife",s.label)} style={{padding:"11px 14px",borderRadius:"8px",cursor:"pointer",border:`2px solid ${form.shelfLife===s.label?G:"#E8F5E9"}`,background:form.shelfLife===s.label?GL:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all 0.15s"}}>
                <span style={{color:form.shelfLife===s.label?G:"#333",fontWeight:"700",fontSize:"13px",fontFamily:"'Nunito',sans-serif"}}>{s.label}</span>
                <span style={{color:"#888",fontSize:"12px",fontFamily:"'Nunito',sans-serif"}}>{s.desc}</span>
              </div>
            ))}</div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("📦 Verpakkingsvorm","📦 Packaging",lang)}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{PACKAGING.map(p=><Tag key={p} label={p} selected={form.packaging===p} onClick={()=>set1("packaging",p)}/>)}</div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("🗓️ Seizoen","🗓️ Season",lang)}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{SEASONS.map(s=><Tag key={s} label={s} selected={form.season===s} onClick={()=>set1("season",s)}/>)}</div>
          </div>
        </div>
      );

      case "output": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          {/* Price slider - always shown including line extension */}
          <RangeSlider label={`💶 ${T("Consumentenprijs","Consumer price",lang)}`} min={1.0} max={15.0} step={0.5} valueMin={form.priceMin} valueMax={form.priceMax} onChange={(min,max)=>setForm(f=>({...f,priceMin:min,priceMax:max}))} unit="€"/>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("✅ Kwaliteitsniveau","✅ Quality level",lang)}</p>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>{QUALITY.map(q=>(
              <div key={q.id} onClick={()=>set1("quality",q.label)} style={{padding:"12px 16px",borderRadius:"10px",cursor:"pointer",border:`2px solid ${form.quality===q.label?G:"#E8F5E9"}`,background:form.quality===q.label?GL:"#fff",transition:"all 0.15s"}}>
                <div style={{fontWeight:"700",fontSize:"13px",color:form.quality===q.label?G:"#333",fontFamily:"'Nunito',sans-serif"}}>{q.label}</div>
                <div style={{fontSize:"11px",color:"#888",marginTop:"2px",fontFamily:"'Nunito',sans-serif"}}>{q.desc}</div>
              </div>
            ))}</div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("🥗 Nutritie","🥗 Nutrition",lang)}</p>
            {[[T("Nutriscore doel","Nutriscore target",lang),"nutriscore",["A","B","C","D","E",T("Geen voorkeur","No preference",lang)],true,false],[T("Eiwitgehalte","Protein level",lang),"proteinLevel",[T("Laag","Low",lang),T("Middel","Medium",lang),T("Hoog","High",lang),T("Engine kiest","Engine decides",lang)],false,isGevogelte],[T("Groente-aandeel","Vegetable share",lang),"vegShare",[">30%",">40%",">50%",T("Engine kiest","Engine decides",lang)],false,isGevogelte]].filter(([,,,,hide])=>!hide).map(([lbl,field,opts,isArr])=>(
              <div key={field} style={{marginBottom:"14px"}}>
                <p style={{color:"#888",fontSize:"11px",fontWeight:"700",margin:"0 0 6px",fontFamily:"'Nunito',sans-serif"}}>{lbl}</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{opts.map(o=>(
                  <button key={o} onClick={()=>isArr?toggle(field,o):set1(field,o)} style={{padding:"6px 14px",borderRadius:"20px",border:`2px solid ${(isArr?form[field].includes(o):form[field]===o)?G:"#C8E6C9"}`,background:(isArr?form[field].includes(o):form[field]===o)?G:"#fff",color:(isArr?form[field].includes(o):form[field]===o)?"#fff":"#388E3C",fontSize:"12px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:(isArr?form[field].includes(o):form[field]===o)?"700":"500"}}>{o}</button>
                ))}</div>
              </div>
            ))}
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("⚙️ Aantal ideeën","⚙️ Number of ideas",lang)}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{(lang==="en"?OUTPUT_EN:OUTPUT_NL).map(o=>(
              <button key={o} onClick={()=>set1("outputCount",o)} style={{padding:"9px 20px",borderRadius:"20px",border:`2px solid ${form.outputCount===o?G:"#C8E6C9"}`,background:form.outputCount===o?G:"#fff",color:form.outputCount===o?"#fff":"#388E3C",fontSize:"14px",fontFamily:"'Nunito',sans-serif",cursor:"pointer",fontWeight:form.outputCount===o?"900":"500"}}>{o}</button>
            ))}</div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",fontWeight:"800",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px",fontFamily:"'Nunito',sans-serif"}}>{T("📝 Extra Briefing / Ideeën","📝 Additional Briefing / Ideas",lang)}</p>
            <textarea value={form.brief} onChange={e=>set1("brief",e.target.value)} placeholder={T("Aanvullende eisen, ideeën, retailer specs, verboden ingrediënten, aanleiding, etc.","Additional requirements, ideas, retailer specs, forbidden ingredients, background, etc.",lang)} style={{width:"100%",minHeight:"110px",background:"#fff",border:"2px solid #C8E6C9",borderRadius:"10px",color:"#333",padding:"14px",fontSize:"13px",fontFamily:"'Nunito',sans-serif",resize:"vertical",outline:"none",lineHeight:"1.6",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor="#C8E6C9"}/>
          </div>
        </div>
      );

      default: return null;
    }
  };

  const summaryRows = [
    [T("💡 Type","💡 Type",lang), `${form.conceptType==="line"?"Line Extension":"Nieuw Concept"}${form.lineExtSegment?" — "+form.lineExtSegment:""}`],
    [T("🐔 Categorie","🐔 Category",lang), form.category],
    [T("🏪 Retailer","🏪 Retailer",lang), form.retailer.join(", ")],
    [T("🌍 Markt","🌍 Market",lang), form.country.join(", ")],
    [T("📈 Trends","📈 Trends",lang), form.trends.join(", ")],
    [T("🍽️ Format","🍽️ Format",lang), form.format.join(", ")],
    [T("💪 Eiwit","💪 Protein",lang), form.protein.join(", ")],
    [T("🌾 Koolhydraten","🌾 Carbs",lang), form.carbs.join(", ")],
    [T("🫙 Saus","🫙 Sauce",lang), form.sauce.join(", ")],
    [T("📦 Verpakking","📦 Packaging",lang), form.packaging],
    [T("🗓️ Seizoen","🗓️ Season",lang), form.season],
    [T("✅ Kwaliteit","✅ Quality",lang), form.quality],
    [T("🏅 Nutriscore","🏅 Nutriscore",lang), form.nutriscore.join(", ")],
    [T("💪 Eiwit doel","💪 Protein target",lang), form.proteinLevel],
    [T("🥦 Groente","🥦 Vegetables",lang), form.vegShare],
    [T("💶 Prijs","💶 Price",lang), `€${form.priceMin.toFixed(2)} – €${form.priceMax.toFixed(2)}`],
    [T("⚖️ Grammage","⚖️ Grammage",lang), `${form.grammageMin}–${form.grammageMax}g`],
    [T("👥 Portie","👥 Portion",lang), form.persons],
    [T("📅 Houdbaarheid","📅 Shelf life",lang), form.shelfLife],
    [T("⚙️ Aantal","⚙️ Count",lang), form.outputCount],
    [T("📝 Briefing","📝 Briefing",lang), form.brief],
  ].filter(([,v])=>v&&v.toString().trim());

  // Language selection
  if(!lang) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#F1F8E9,#FFF8E1)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
      <div style={{background:"#fff",borderRadius:"20px",padding:"48px 40px",maxWidth:"420px",width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.1)",border:"1px solid #E8F5E9",textAlign:"center"}}>
        <div style={{width:"56px",height:"56px",borderRadius:"14px",background:`linear-gradient(135deg,${G},${GM})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",boxShadow:"0 4px 14px rgba(46,125,50,0.3)",margin:"0 auto 20px"}}>⚡</div>
        <h1 style={{fontSize:"24px",fontWeight:"900",color:"#1B5E20",fontFamily:"'Nunito',sans-serif",margin:"0 0 4px"}}>Innovation Engine</h1>
        <p style={{fontSize:"11px",color:"#aaa",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:"600",fontFamily:"'Nunito',sans-serif",margin:"0 0 36px"}}>Plukon Food Group · v3.0</p>
        <p style={{fontSize:"16px",color:"#555",fontFamily:"'Nunito',sans-serif",marginBottom:"28px",fontWeight:"600"}}>Kies je taal / Choose your language</p>
        <div style={{display:"flex",gap:"14px"}}>
          <button onClick={()=>setLang("nl")} style={{flex:1,padding:"20px",background:`linear-gradient(135deg,${G},${GM})`,color:"#fff",border:"none",borderRadius:"14px",cursor:"pointer",fontSize:"17px",fontWeight:"900",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 14px rgba(46,125,50,0.3)"}}>Nederlands</button>
          <button onClick={()=>setLang("en")} style={{flex:1,padding:"20px",background:`linear-gradient(135deg,${O},${OM})`,color:"#fff",border:"none",borderRadius:"14px",cursor:"pointer",fontSize:"17px",fontWeight:"900",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 14px rgba(245,124,0,0.3)"}}>English</button>
        </div>
      </div>
    </div>
  );

  if(!apiKey) return <ApiKeyScreen onSave={setApiKey} lang={lang}/>;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#F1F8E9 0%,#FFF8E1 100%)",fontFamily:"'Nunito',sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
      <div style={{background:"#fff",borderBottom:"3px solid #E8F5E9",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",height:"64px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{width:"38px",height:"38px",borderRadius:"10px",background:`linear-gradient(135deg,${G},${GM})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 3px 10px rgba(46,125,50,0.3)"}}><span style={{fontSize:"18px"}}>⚡</span></div>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:"6px"}}>
              <span style={{fontSize:"17px",fontWeight:"900",color:G}}>Innovation</span>
              <span style={{fontSize:"17px",fontWeight:"900",color:O}}>Engine</span>
              <span style={{fontSize:"10px",background:OL,color:O,borderRadius:"4px",padding:"1px 6px",fontWeight:"800",letterSpacing:"0.06em"}}>v3.0</span>
            </div>
            <div style={{fontSize:"10px",color:"#aaa",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:"600"}}>Plukon Food Group</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          {phase!=="steps"&&<button onClick={reset} style={{background:"#fff",border:"1px solid #E0E0E0",color:"#666",padding:"7px 14px",borderRadius:"20px",cursor:"pointer",fontSize:"12px",fontWeight:"700"}}>{T("↩ Opnieuw","↩ Restart",lang)}</button>}
          <button onClick={()=>{setLang("");}} style={{background:"#fff",border:"1px solid #E0E0E0",color:"#666",padding:"7px 12px",borderRadius:"20px",cursor:"pointer",fontSize:"11px",fontWeight:"700"}}>{lang==="en"?"EN":"NL"}</button>
          <button onClick={()=>{localStorage.removeItem("plukon_api_key");setApiKey("");}} style={{background:"#fff",border:"1px solid #FFCDD2",color:"#E53935",padding:"7px 12px",borderRadius:"20px",cursor:"pointer",fontSize:"11px",fontWeight:"700"}}>🔑</button>
        </div>
      </div>

      <div style={{maxWidth:"820px",margin:"0 auto",padding:"32px 20px"}}>
        {phase==="steps"&&(
          <>
            <StepDot steps={activeSteps} currentStep={step} completedSteps={done}/>
            <div style={{background:"#fff",borderRadius:"16px",padding:"28px",marginBottom:"20px",boxShadow:"0 4px 20px rgba(0,0,0,0.07)",border:"1px solid #E8F5E9"}}>
              <div style={{marginBottom:"22px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                  <span style={{fontSize:"24px"}}>{activeSteps[step]?.icon}</span>
                  <h2 style={{margin:0,fontSize:"22px",fontWeight:"900",color:"#1B5E20",fontFamily:"'Nunito',sans-serif"}}>{activeSteps[step]?.label}</h2>
                </div>
                <div style={{height:"3px",background:`linear-gradient(90deg,${O},${OM},transparent)`,borderRadius:"2px"}}/>
              </div>
              {stepContent()}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{background:"#fff",border:"1px solid #E0E0E0",color:step===0?"#ccc":"#666",padding:"10px 22px",borderRadius:"20px",cursor:step===0?"default":"pointer",fontSize:"13px",fontWeight:"700"}}>
                {T("← Vorige","← Previous",lang)}
              </button>
              <button onClick={advance} style={{background:`linear-gradient(135deg,${O},${OM})`,color:"#fff",border:"none",padding:"12px 28px",borderRadius:"20px",cursor:"pointer",fontSize:"14px",fontWeight:"900",boxShadow:"0 4px 14px rgba(245,124,0,0.35)"}}>
                {step<activeSteps.length-1?T("Volgende →","Next →",lang):T("Naar overzicht →","To overview →",lang)}
              </button>
            </div>
          </>
        )}

        {phase==="summary"&&(
          <div style={{background:"#fff",borderRadius:"16px",padding:"28px",boxShadow:"0 4px 20px rgba(0,0,0,0.07)",border:"1px solid #E8F5E9"}}>
            <h2 style={{margin:"0 0 6px",fontWeight:"900",fontSize:"24px",color:"#1B5E20",fontFamily:"'Nunito',sans-serif"}}>{T("Briefing Overzicht","Briefing Overview",lang)}</h2>
            <div style={{height:"3px",background:`linear-gradient(90deg,${O},${OM},transparent)`,borderRadius:"2px",marginBottom:"20px"}}/>
            {isLineExt&&Object.keys(getPresets()).length>0&&(
              <div style={{background:GL,borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",border:"1px solid #C8E6C9"}}>
                <p style={{margin:"0 0 4px",fontSize:"12px",fontWeight:"800",color:G,fontFamily:"'Nunito',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>✦ {T("Vaste parameters","Fixed parameters",lang)} — {form.lineExtSegment}</p>
                <p style={{margin:0,fontSize:"12px",color:"#555",fontFamily:"'Nunito',sans-serif"}}>
                  {T("Format","Format",lang)}: {getPresets().format} · {T("Verpakking","Packaging",lang)}: {getPresets().packaging} · {T("Grammage","Grammage",lang)}: {getPresets().grammageMin}–{getPresets().grammageMax}g · Nutriscore: {getPresets().nutriscore?.join("/")}
                </p>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:"5px",marginBottom:"24px"}}>
              {summaryRows.map(([label,value])=>(
                <div key={label} style={{display:"flex",gap:"12px",padding:"8px 14px",background:"#FAFAFA",borderRadius:"8px",border:"1px solid #F1F8E9"}}>
                  <span style={{color:"#888",fontSize:"12px",minWidth:"130px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>{label}</span>
                  <span style={{color:"#333",fontSize:"12px",fontWeight:"600",flex:1,fontFamily:"'Nunito',sans-serif"}}>{value}</span>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
              <button onClick={generate} style={{background:`linear-gradient(135deg,${G},${GM})`,color:"#fff",border:"none",padding:"14px 28px",borderRadius:"20px",cursor:"pointer",fontSize:"14px",fontWeight:"900",boxShadow:"0 4px 16px rgba(46,125,50,0.3)",fontFamily:"'Nunito',sans-serif"}}>
                ⚡ {T("Genereer Ideeën","Generate Ideas",lang)}
              </button>
              <button onClick={()=>{setPhase("steps");setStep(activeSteps.length-1);}} style={{background:"#fff",border:"1px solid #E0E0E0",color:"#666",padding:"14px 18px",borderRadius:"20px",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>
                {T("← Aanpassen","← Adjust",lang)}
              </button>
            </div>
          </div>
        )}

        {phase==="generating"&&(
          <div style={{background:"#fff",borderRadius:"16px",padding:"48px",textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.07)",border:"1px solid #E8F5E9"}}>
            <div style={{width:"48px",height:"48px",border:`4px solid ${GL}`,borderTop:`4px solid ${G}`,borderRadius:"50%",animation:"spin 0.9s linear infinite",margin:"0 auto 20px"}}/>
            <h2 style={{fontWeight:"900",fontSize:"22px",color:"#1B5E20",margin:"0 0 8px",fontFamily:"'Nunito',sans-serif"}}>{T("Ideeën worden gegenereerd...","Generating ideas...",lang)}</h2>
            <p style={{color:"#888",fontSize:"14px",fontFamily:"'Nunito',sans-serif"}}>{T("AI verwerkt uw briefing — even geduld (~30 sec)","AI is processing your briefing — please wait (~30 sec)",lang)}</p>
            <div style={{marginTop:"24px",height:"4px",background:"#E8F5E9",borderRadius:"2px",overflow:"hidden"}}>
              <div style={{height:"100%",width:"40%",background:`linear-gradient(90deg,${G},${GM},${O})`,borderRadius:"2px",animation:"slide 1.8s ease-in-out infinite"}}/>
            </div>
          </div>
        )}

        {phase==="results"&&(
          <>
            <div style={{marginBottom:"24px"}}>
              <h2 style={{fontWeight:"900",fontSize:"26px",color:"#1B5E20",margin:"0 0 4px",fontFamily:"'Nunito',sans-serif"}}>
                {concepts.length>0?`${concepts.length} ${T("Productideeën","Product ideas",lang)}`:T("Generatie voltooid","Generation complete",lang)}
              </h2>
              <p style={{color:"#888",fontSize:"13px",fontFamily:"'Nunito',sans-serif"}}>
                {[form.category,form.lineExtSegment,...form.retailer,...form.country].filter(Boolean).join(" · ")||"Plukon NPD 2026"}
              </p>
            </div>
            {apiLog&&(
              <div style={{background:"#FFF3E0",border:`1px solid ${OM}`,borderRadius:"10px",padding:"14px 16px",marginBottom:"20px"}}>
                <p style={{margin:"0 0 4px",fontSize:"12px",fontWeight:"800",color:O,fontFamily:"'Nunito',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>⚠ Debug</p>
                <p style={{margin:0,fontSize:"12px",color:"#555",fontFamily:"monospace",whiteSpace:"pre-wrap"}}>{apiLog}</p>
              </div>
            )}
            {concepts.map((c,i)=><ConceptCard key={i} concept={c} index={i} lang={lang}/>)}
            <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginTop:"8px"}}>
              {concepts.length>0&&<button onClick={generate} style={{background:"#fff",border:`2px solid ${G}`,color:G,padding:"11px 20px",borderRadius:"20px",cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:"'Nunito',sans-serif"}}>⟳ {T("Nieuwe variatie","New variation",lang)}</button>}
              <button onClick={()=>setPhase("summary")} style={{background:"#fff",border:"1px solid #E0E0E0",color:"#666",padding:"11px 20px",borderRadius:"20px",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>{T("← Briefing aanpassen","← Adjust briefing",lang)}</button>
              <button onClick={reset} style={{background:"#fff",border:"1px solid #E0E0E0",color:"#999",padding:"11px 20px",borderRadius:"20px",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:"'Nunito',sans-serif"}}>{T("Nieuwe briefing","New briefing",lang)}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<InnovationEngine/>);
</script>
</body>
</html>
