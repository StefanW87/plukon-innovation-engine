// ── Concept parsing helper ───────────────────────────────────────────────────
function parseConcept(concept, index) {
  const lines = concept.split("\n").filter(Boolean);
  const titleLine = lines[0]?.replace(/^#+\s*/,"").replace(/\*\*/g,"") || `Concept ${index+1}`;
  const [titleName, tagline] = titleLine.includes(" — ") ? titleLine.split(" — ") : [titleLine,""];
  const sections = {};
  let currentSection = null, currentLines = [];
  const sectionNames = ["Samenvatting","Doelconsument","Ingrediënten","Nutritie","Specs","Trends","Retailfit","Haalbaarheid","Aandachtspunten"];
  lines.slice(1).forEach(line => {
    const clean = line.replace(/\*\*/g,"").trim();
    if (sectionNames.includes(clean)) {
      if (currentSection) sections[currentSection] = currentLines.join("\n").trim();
      currentSection = clean; currentLines = [];
    } else if (currentSection) currentLines.push(line);
  });
  if (currentSection) sections[currentSection] = currentLines.join("\n").trim();

  // Extract USPs from Samenvatting (3 sentences)
  const summary = sections["Samenvatting"] || "";
  const usps = summary.split(/\.\s+/).filter(s=>s.trim().length>10).slice(0,3).map(s=>s.replace(/\*\*/g,"").trim()+".");

  // Extract key stats
  const extract = (text, rx) => text?.match(rx)?.[1] || "—";
  const grammage   = extract(sections["Specs"],    /Grammage[:\s]+(ca\.?\s*[\d\-–\s]+g[^\n,]*)/i) || extract(sections["Specs"], /Grammage[:\s]+([^\n,]+)/);
  const prijs      = extract(sections["Specs"],    /Prijs[:\s]+(€[\d,\.]+)/);
  const houdbaarheid = extract(sections["Specs"],  /Houdbaarheid[:\s]+([^\n,]+)/);
  const eiwit      = extract(sections["Nutritie"], /Eiwit[:\s]+([\d]+g)/);
  const nutriscore = sections["Nutritie"]?.match(/Nutriscore[:\s]+([A-E])/)?.[1] || "—";
  const skus       = extract(sections["Specs"],    /SKU[^:]*:[\s]+([^\n]+)/);

  const cleanTitle = titleName.replace(/[^a-zA-Z0-9 ]/g," ").trim().slice(0,50);
  const imgPrompt = encodeURIComponent(`professional food photo ${cleanTitle} fresh ingredients colorful top view white plate`);
  const imgUrl = `https://image.pollinations.ai/prompt/${imgPrompt}?width=600&height=400&nologo=true&seed=${(index+1)*9999}`;

  return { titleName, tagline, sections, usps, grammage, prijs, houdbaarheid, eiwit, nutriscore, skus, imgUrl, sectionNames };
}

function InnovationEngine() {
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem("plukon_api_key")||"");
  const [step, setStep]     = useState(0);
  const [done, setDone]     = useState([]);
  const [phase, setPhase]   = useState("steps");
  const [concepts, setConcepts] = useState([]);
  const [apiLog, setApiLog] = useState("");
  const [selectedConcept, setSelectedConcept] = useState(null);
  const [form, setForm]     = useState({
    category:"", categorySubs:[],
    retailer:[], country:[], trends:[], format:[],
    protein:[], carbs:[], vegetables:[], sauce:[],
    packaging:[], season:"",
    quality:"", price:[], grammage:[], persons:[], shelfLife:"",
    nutriTarget:[], proteinPref:[], vegPref:[],
    outputCount:"4 producten", brief:"",
  });

  const toggle = (field, val) => setForm(f=>({ ...f, [field]: f[field].includes(val)?f[field].filter(v=>v!==val):[...f[field],val] }));
  const setSingle = (field, val) => setForm(f=>({...f, [field]:val}));

  const advance = () => {
    const id = STEPS[step].id;
    setDone(d=>d.includes(id)?d:[...d,id]);
    if (step < STEPS.length-1) setStep(s=>s+1); else setPhase("summary");
  };

  const reset = () => {
    setStep(0); setDone([]); setConcepts([]); setPhase("steps"); setApiLog("");
    setForm({ category:"", categorySubs:[], retailer:[], country:[], trends:[], format:[], protein:[], carbs:[], vegetables:[], sauce:[], packaging:[], season:"", quality:"", price:[], grammage:[], persons:[], shelfLife:"", nutriTarget:[], proteinPref:[], vegPref:[], outputCount:"4 producten", brief:"" });
  };

  // Build retailer + country intelligence string
  const getMarketIntel = () => {
    const parts = [];
    form.retailer.forEach(r => {
      const p = RETAILER_PROFILES[r];
      if (p) parts.push(`${r}: ${p.notes}`);
    });
    form.country.forEach(c => {
      const p = COUNTRY_PROFILES[c];
      if (p) parts.push(`Consument ${c}: ${p}`);
    });
    return parts.join("\n");
  };

  const buildPrompt = () => {
    const n = parseInt(((form.outputCount||"4 producten").match(/\d+/)||["4"])[0]);
    const marketIntel = getMarketIntel();
    return `TAAK: Genereer precies ${n} productconcepten voor Plukon Food Group NPD pipeline 2026.

CATEGORIE: ${form.category||"Vrij"} ${form.categorySubs.length?`(${form.categorySubs.join(", ")})`: ""}
RETAILER: ${form.retailer.join(", ")||"Vrij"}
MARKT: ${form.country.join(", ")||"Vrij"}
TRENDS: ${form.trends.join(", ")||"Vrij"}
FORMAT: ${form.format.join(", ")||"Vrij"}
EIWIT: ${form.protein.join(", ")||"Vrij"}
KOOLHYDRATEN: ${form.carbs.join(", ")||"Vrij"}
GROENTEN: ${form.vegetables.join(", ")||"Vrij"}
SAUS: ${form.sauce.join(", ")||"Vrij"}
VERPAKKING: ${form.packaging.join(", ")||"Vrij"}
SEIZOEN: ${form.season||"Jaarrond"}
KWALITEIT: ${form.quality||"Vrij"}
PRIJS: ${form.price.join(", ")||"Vrij"}
GRAMMAGE: ${form.grammage.join(", ")||"Vrij"}
PERSONEN: ${form.persons.join(", ")||"Vrij"}
HOUDBAARHEID: ${form.shelfLife||"Vrij"}
NUTRISCORE DOEL: ${(form.nutriTarget||[]).join(", ")||"Engine kiest"}
EIWIT DOEL: ${(form.proteinPref||[]).join(", ")||"Engine kiest"}
GROENTE AANDEEL: ${(form.vegPref||[]).join(", ")||"Engine kiest"}
EXTRA: ${form.brief||"Geen"}

MARKT & RETAILER INTELLIGENTIE:
${marketIntel||"Geen specifieke marktinformatie"}

TREND & FABRIEKSCONTEXT:
${TREND_CONTEXT}

VERPLICHT FORMAT — gebruik dit EXACT voor elk concept:

## [Productnaam] — [Tagline max 5 woorden]

**Samenvatting**
[3 zinnen: wat is het, waarom uniek, voor wie en wanneer]

**Doelconsument**
[Leeftijd, levensstijl, aankoopmoment, motivatie — specifiek voor de opgegeven markt en retailer]

**Ingrediënten**
[Alle kern-ingrediënten met percentages, allergenen, clean label status]

**Nutritie**
- Eiwit: [Xg per portie]
- Zout: [X,Xg per 100g]
- Groente-aandeel: [X%]
- Kcal: [X kcal per portie]
- Nutriscore: [A/B/C] — [onderbouwing]

**Specs**
- Grammage: [Xg]
- Prijs: [€X,XX]
- Houdbaarheid: [categorie, X dagen]
- Verpakking: [type]
- SKU's: [varianten]

**Trends**
- [Trend 1]: [waarom dit concept hierop inspeelt]
- [Trend 2]: [waarom]
- [Trend 3]: [waarom]

**Retailfit**
[Schapsegment, positionering, wit in assortiment, consumentfit voor opgegeven retailer en markt]

**Haalbaarheid**
[Productiecomplexiteit laag/midden/hoog, welke Plukon fabriek, doorlooptijd]

**Aandachtspunten**
- [Concreet punt 1]
- [Concreet punt 2]

REGELS:
1. Begin DIRECT met ## — geen inleiding
2. Vul ELKE sectie volledig in — geen lege velden
3. Geen markdown tabellen, geen --- lijnen
4. Wees concreet: specifieke smaken, grammen, prijzen
5. Pas doelconsument en retailfit AAN op de opgegeven markt/retailer
6. Check allergeenregime: geen noten direct in product, sesam vermijden
7. ${n} concepten — duidelijk verschillend in smaak, doelgroep en format`;
  };

  const generate = async () => {
    setPhase("generating"); setConcepts([]); setApiLog(""); setSelectedConcept(null);
    try {
      const res = await fetch("/api/generate", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":apiKey },
        body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:6000, messages:[{role:"user",content:buildPrompt()}] }),
      });
      let raw=""; try{raw=await res.text();}catch(e){setApiLog("Read error: "+e.message);setPhase("results");return;}
      let data; try{data=JSON.parse(raw);}catch(e){setApiLog("Parse error: "+raw.slice(0,300));setPhase("results");return;}
      if(!res.ok){setApiLog("API error ("+res.status+"): "+(data?.error?.message||JSON.stringify(data)));setPhase("results");return;}
      const text=(data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n");
      if(!text.trim()){setApiLog("Lege respons: "+JSON.stringify(data).slice(0,300));setPhase("results");return;}
      setConcepts(text.split(/\n(?=## )/).filter(p=>p.trim()));
    } catch(e){setApiLog("Fout: "+e.message);}
    setPhase("results");
  };

  const stepContent = () => {
    switch(STEPS[step].id) {

      case "category": return (
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {CATEGORIES.map(cat=>(
            <div key={cat.id} onClick={()=>setSingle("category",cat.id)} style={{ padding:"16px 18px", borderRadius:"10px", cursor:"pointer", border:`2px solid ${form.category===cat.id?cat.border:"#E8F5E9"}`, background:form.category===cat.id?cat.color:"#fff", transition:"all 0.15s", display:"flex", alignItems:"center", gap:"12px" }}>
              <span style={{fontSize:"24px"}}>{cat.icon}</span>
              <span style={{ fontWeight:"800", fontSize:"15px", color:form.category===cat.id?G:"#333", fontFamily:"'Nunito',sans-serif" }}>{cat.label}</span>
              {form.category===cat.id && <span style={{marginLeft:"auto",color:cat.border,fontSize:"16px"}}>✓</span>}
            </div>
          ))}
        </div>
      );

      case "retailer": return (
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
          {RETAILERS.map(r=><Tag key={r} label={r} selected={form.retailer.includes(r)} onClick={()=>toggle("retailer",r)}/>)}
        </div>
      );

      case "country": return (
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
          {COUNTRIES.map(c=><Tag key={c} label={c} selected={form.country.includes(c)} onClick={()=>toggle("country",c)}/>)}
        </div>
      );

      case "trends": return (
        <div>
          <p style={{color:"#666",fontSize:"13px",marginBottom:"10px",fontFamily:"'Nunito',sans-serif"}}>Meerdere mogelijk</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
            {TRENDS.map((t,i)=>(
              <div key={t} style={{position:"relative"}}>
                <Tag label={t} selected={form.trends.includes(t)} onClick={()=>toggle("trends",t)}/>
              </div>
            ))}
          </div>
        </div>
      );

      case "format": return <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{FORMATS.map(f=><Tag key={f} label={f} selected={form.format.includes(f)} onClick={()=>toggle("format",f)}/>)}</div>;

      case "ingredients": return (
        <div style={{display:"flex",flexDirection:"column",gap:"24px"}}>
          <div>
            <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 12px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>💪 Eiwitbron</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {PROTEIN_CLUSTERS.map(cluster=>(
                <button key={cluster.label} onClick={()=>toggle("protein",cluster.label)} style={{
                  padding:"9px 16px", borderRadius:"20px",
                  border:`2px solid ${form.protein.includes(cluster.label)?G:"#C8E6C9"}`,
                  background:form.protein.includes(cluster.label)?G:"#fff",
                  color:form.protein.includes(cluster.label)?"#fff":"#388E3C",
                  fontSize:"13px", fontFamily:"'Nunito',sans-serif",
                  cursor:"pointer", fontWeight:form.protein.includes(cluster.label)?"700":"500",
                  transition:"all 0.15s",
                }}>{cluster.label}</button>
              ))}
            </div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 12px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>🌾 Koolhydraat component</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {CARB_CLUSTERS.map(cluster=>(
                <button key={cluster.label} onClick={()=>toggle("carbs",cluster.label)} style={{
                  padding:"9px 16px", borderRadius:"20px",
                  border:`2px solid ${form.carbs.includes(cluster.label)?G:"#C8E6C9"}`,
                  background:form.carbs.includes(cluster.label)?G:"#fff",
                  color:form.carbs.includes(cluster.label)?"#fff":"#388E3C",
                  fontSize:"13px", fontFamily:"'Nunito',sans-serif",
                  cursor:"pointer", fontWeight:form.carbs.includes(cluster.label)?"700":"500",
                  transition:"all 0.15s",
                }}>{cluster.label}</button>
              ))}
            </div>
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 12px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>🫙 Saus / Dressing</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {SAUCE_CLUSTERS.map(cluster=>(
                <button key={cluster.label} onClick={()=>toggle("sauce",cluster.label)} style={{
                  padding:"9px 16px", borderRadius:"20px",
                  border:`2px solid ${form.sauce.includes(cluster.label)?G:"#C8E6C9"}`,
                  background:form.sauce.includes(cluster.label)?G:"#fff",
                  color:form.sauce.includes(cluster.label)?"#fff":"#388E3C",
                  fontSize:"13px", fontFamily:"'Nunito',sans-serif",
                  cursor:"pointer", fontWeight:form.sauce.includes(cluster.label)?"700":"500",
                  transition:"all 0.15s",
                }}>{cluster.label}</button>
              ))}
            </div>
          </div>
        </div>
      );

      case "packaging": return (
        <div>
          
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"20px"}}>
            {PACKAGING.map(p=><Tag key={p} label={p} selected={form.packaging.includes(p)} onClick={()=>toggle("packaging",p)}/>)}
          </div>
          <div>
            <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 8px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>🗓️ Seizoen</p>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {SEASONS.map(s=>(
                <div key={s} onClick={()=>setSingle("season",s)} style={{ padding:"11px 14px", borderRadius:"8px", cursor:"pointer", border:`2px solid ${form.season===s?G:"#E8F5E9"}`, background:form.season===s?GL:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between", transition:"all 0.15s" }}>
                  <span style={{color:form.season===s?G:"#333",fontWeight:"700",fontSize:"13px",fontFamily:"'Nunito',sans-serif"}}>{s}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      case "quality": return (
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {QUALITY_TIERS.map(q=>(
            <div key={q.id} onClick={()=>setSingle("quality",q.label)} style={{ padding:"14px 16px", borderRadius:"10px", cursor:"pointer", border:`2px solid ${form.quality===q.label?G:"#E8F5E9"}`, background:form.quality===q.label?GL:"#fff", transition:"all 0.15s" }}>
              <div style={{color:form.quality===q.label?G:"#333",fontWeight:"700",fontSize:"14px",fontFamily:"'Nunito',sans-serif"}}>{q.label}</div>
              <div style={{color:"#888",fontSize:"12px",marginTop:"2px",fontFamily:"'Nunito',sans-serif"}}>{q.desc}</div>
            </div>
          ))}
        </div>
      );

      case "specs": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          {[["💶 Consumentenprijs","price",PRICE_RANGES],["⚖️ Grammage","grammage",GRAMMAGES],["👥 Portie / Personen","persons",PERSONS]].map(([lbl,fld,opts])=>(
            <div key={fld}>
              <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 8px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>{lbl}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{opts.map(o=><Tag key={o} label={o} selected={form[fld].includes(o)} onClick={()=>toggle(fld,o)}/>)}</div>
            </div>
          ))}
          <div>
            <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 8px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>📅 Houdbaarheid</p>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {SHELF_LIFE.map(s=>(
                <div key={s.id} onClick={()=>setSingle("shelfLife",s.label+" ("+s.desc+")")} style={{ padding:"11px 14px", borderRadius:"8px", cursor:"pointer", border:`2px solid ${form.shelfLife.startsWith(s.label)?G:"#E8F5E9"}`, background:form.shelfLife.startsWith(s.label)?GL:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between", transition:"all 0.15s" }}>
                  <span style={{color:form.shelfLife.startsWith(s.label)?G:"#333",fontWeight:"700",fontSize:"13px",fontFamily:"'Nunito',sans-serif"}}>{s.label}</span>
                  <span style={{color:"#888",fontSize:"12px",fontFamily:"'Nunito',sans-serif"}}>{s.desc}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      case "nutrition": return (
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>
          <div style={{background:GL,borderRadius:"10px",padding:"12px 14px",border:"1px solid #C8E6C9"}}>
            <p style={{margin:"0 0 3px",fontSize:"12px",color:G,fontWeight:"800",fontFamily:"'Nunito',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>💡 Clean Label Standaard</p>
            <p style={{margin:0,fontSize:"12px",color:"#555",fontFamily:"'Nunito',sans-serif",lineHeight:"1.6"}}>Geen E-nummers · Geen kunstmatige aroma's · Geen MSG · Korte ingrediëntenlijst · Ondersteunt Nutriscore verbetering</p>
          </div>
          {[
            ["🏅 Nutriscore doel","nutriTarget",["A","B","C","D","E","Geen voorkeur"]],
            ["💪 Eiwitgehalte","proteinPref",["Laag","Middel","Hoog","Engine kiest"]],
            ["🥦 Groente-aandeel","vegPref",VEG_PREF],
          ].map(([lbl,fld,opts])=>(
            <div key={fld} style={{marginBottom:"16px"}}>
              <p style={{color:G,fontSize:"12px",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0 0 8px",fontFamily:"'Nunito',sans-serif",fontWeight:"800"}}>{lbl}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{opts.map(o=>(
                <button key={o} onClick={()=>{
                  if(fld==="nutriTarget"){
                    setSingle(fld, form[fld]===o ? (form[fld].filter?form[fld].filter(v=>v!==o):"") : o);
                    // nutriTarget allows multiple
                    setForm(f=>({...f, nutriTarget: f.nutriTarget.includes?
                      (f.nutriTarget.includes(o)?f.nutriTarget.filter(v=>v!==o):[...f.nutriTarget,o])
                      : [o]
                    }));
                  } else { setSingle(fld,o); }
                }} style={{ padding:"7px 14px", borderRadius:"20px", border:`2px solid ${(Array.isArray(form[fld])?form[fld].includes(o):form[fld]===o)?G:"#C8E6C9"}`, background:(Array.isArray(form[fld])?form[fld].includes(o):form[fld]===o)?G:"#fff", color:(Array.isArray(form[fld])?form[fld].includes(o):form[fld]===o)?"#fff":"#388E3C", fontSize:"13px", fontFamily:"'Nunito',sans-serif", cursor:"pointer", fontWeight:(Array.isArray(form[fld])?form[fld].includes(o):form[fld]===o)?"700":"500", transition:"all 0.15s" }}>{o}</button>
              ))}</div>
            </div>
          ))}
        </div>
      );

      case "output": return (
        <div>
          <p style={{color:"#666",fontSize:"13px",marginBottom:"12px",fontFamily:"'Nunito',sans-serif"}}>Hoeveel productconcepten wil je laten genereren?</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
            {OUTPUT_COUNT.map(o=>(
              <button key={o} onClick={()=>setSingle("outputCount",o)} style={{ padding:"10px 20px", borderRadius:"20px", border:`2px solid ${form.outputCount===o?G:"#C8E6C9"}`, background:form.outputCount===o?G:"#fff", color:form.outputCount===o?"#fff":"#388E3C", fontSize:"14px", fontFamily:"'Nunito',sans-serif", cursor:"pointer", fontWeight:form.outputCount===o?"800":"500", transition:"all 0.15s", boxShadow:form.outputCount===o?"0 2px 8px rgba(46,125,50,0.25)":"none" }}>{o}</button>
            ))}
          </div>
          <div style={{marginTop:"20px",padding:"12px 14px",background:OL,borderRadius:"8px",border:`1px solid ${OM}`}}>
            <p style={{margin:"0 0 4px",fontSize:"12px",fontWeight:"800",color:O,fontFamily:"'Nunito',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>💡 Indicatie</p>
            <p style={{margin:0,fontSize:"12px",color:"#666",fontFamily:"'Nunito',sans-serif",lineHeight:"1.6"}}>
              {form.outputCount==="1 product"?"Diepgaand 1 concept — snel en gericht.":
               form.outputCount==="2 concepten"?"2 contrasterende concepten — goed voor vergelijking.":
               form.outputCount==="3 concepten"?"3 concepten — standaard voor eerste verkenning.":
               form.outputCount==="4 producten"?"4 concepten — breed overzicht, aanbevolen voor brainstorm.":
               form.outputCount==="5 concepten"?"5 concepten — uitgebreide verkenning.":
               "6 concepten — maximale output, duurt iets langer (~45 sec)."}
            </p>
          </div>
        </div>
      );

      case "brief": return (
        <div>
          <p style={{color:"#666",fontSize:"13px",marginBottom:"10px",fontFamily:"'Nunito',sans-serif"}}>Aanvullende eisen, retailer specs, verboden ingrediënten, aanleiding, etc.</p>
          <textarea value={form.brief} onChange={e=>setSingle("brief",e.target.value)}
            placeholder="Bijv: AH vereist MSC-gecertificeerde vis, max 450 kcal, doelprijs €3,99, geen sesamzaadjes, bestemd voor BBQ seizoen 2026..."
            style={{ width:"100%", minHeight:"130px", background:"#fff", border:"2px solid #C8E6C9", borderRadius:"10px", color:"#333", padding:"14px", fontSize:"13px", fontFamily:"'Nunito',sans-serif", resize:"vertical", outline:"none", lineHeight:"1.6", boxSizing:"border-box" }}
            onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor="#C8E6C9"}/>
        </div>
      );

      default: return null;
    }
  };

  const summaryRows = [
    ["🐔 Categorie",      [form.category, ...form.categorySubs].filter(Boolean).join(" · ")],
    ["🏪 Retailer",       form.retailer.join(", ")],
    ["🌍 Markt",          form.country.join(", ")],
    ["📈 Trends",         form.trends.join(", ")],
    ["🍽️ Format",         form.format.join(", ")],
    ["💪 Eiwit",          form.protein.join(", ")],
    ["🌾 Koolhydraten",   form.carbs.join(", ")],
    ["🫙 Saus",           form.sauce.join(", ")],
    ["📦 Verpakking",     form.packaging.join(", ")],
    ["🗓️ Seizoen",        form.season],
    ["✅ Kwaliteit",      form.quality],
    ["💶 Prijs",          form.price.join(", ")],
    ["⚖️ Grammage",       form.grammage.join(", ")],
    ["👥 Personen",       form.persons.join(", ")],
    ["📅 Houdbaarheid",   form.shelfLife],
    ["🏅 Nutriscore",     (form.nutriTarget||[]).join(", ")],
    ["💪 Eiwit doel",     (form.proteinPref||[]).join(", ")],
    ["🥦 Groente %",      (form.vegPref||[]).join(", ")],
    ["⚙️ Output",         form.outputCount],
    ["📝 Extra brief",    form.brief],
  ].filter(([,v])=>v&&v.trim());

  if (!apiKey) return <ApiKeyScreen onSave={setApiKey}/>;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#F1F8E9 0%,#FFF8E1 100%)", fontFamily:"'Nunito',sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

      {/* Header */}
      <div style={{ background:"#fff", borderBottom:"3px solid #E8F5E9", padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", height:"64px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
          <div style={{ width:"38px", height:"38px", borderRadius:"10px", background:`linear-gradient(135deg,${G},${GM})`, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 3px 10px rgba(46,125,50,0.3)" }}>
            <span style={{fontSize:"18px"}}>⚡</span>
          </div>
          <div>
            <div style={{ display:"flex", alignItems:"baseline", gap:"6px" }}>
              <span style={{ fontSize:"17px", fontWeight:"900", color:G }}>Innovation</span>
              <span style={{ fontSize:"17px", fontWeight:"900", color:O }}>Engine</span>
              <span style={{ fontSize:"10px", background:OL, color:O, borderRadius:"4px", padding:"1px 6px", fontWeight:"800", letterSpacing:"0.06em" }}>v2.0</span>
            </div>
            <div style={{ fontSize:"10px", color:"#aaa", letterSpacing:"0.08em", textTransform:"uppercase", fontWeight:"600" }}>Plukon Food Group · NPD Tool</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
          {phase!=="steps" && <button onClick={reset} style={{ background:"#fff", border:"1px solid #E0E0E0", color:"#666", padding:"7px 14px", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontWeight:"700" }}>↩ Opnieuw</button>}
          <button onClick={()=>{localStorage.removeItem("plukon_api_key");setApiKey("");}} style={{ background:"#fff", border:"1px solid #FFCDD2", color:"#E53935", padding:"7px 12px", borderRadius:"20px", cursor:"pointer", fontSize:"11px", fontWeight:"700" }}>🔑</button>
        </div>
      </div>

      <div style={{ maxWidth:"820px", margin:"0 auto", padding:"32px 20px" }}>

        {/* STEPS */}
        {phase==="steps" && (
          <>
            <StepDot steps={STEPS} currentStep={step} completedSteps={done}/>
            <div style={{ background:"#fff", borderRadius:"16px", padding:"28px", marginBottom:"20px", boxShadow:"0 4px 20px rgba(0,0,0,0.07)", border:"1px solid #E8F5E9" }}>
              <div style={{ marginBottom:"22px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"6px" }}>
                  <span style={{fontSize:"24px"}}>{STEPS[step].icon}</span>
                  <h2 style={{ margin:0, fontSize:"22px", fontWeight:"900", color:"#1B5E20", fontFamily:"'Nunito',sans-serif" }}>{STEPS[step].label}</h2>
                </div>
                <div style={{ height:"3px", background:`linear-gradient(90deg,${O},${OM},transparent)`, borderRadius:"2px" }}/>
              </div>
              {stepContent()}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{ background:"#fff", border:"1px solid #E0E0E0", color:step===0?"#ccc":"#666", padding:"10px 22px", borderRadius:"20px", cursor:step===0?"default":"pointer", fontSize:"13px", fontWeight:"700" }}>← Vorige</button>
              <button onClick={advance} style={{ background:`linear-gradient(135deg,${O},${OM})`, color:"#fff", border:"none", padding:"12px 28px", borderRadius:"20px", cursor:"pointer", fontSize:"14px", fontWeight:"900", boxShadow:"0 4px 14px rgba(245,124,0,0.35)" }}>
                {step<STEPS.length-1?"Volgende →":"Naar overzicht →"}
              </button>
            </div>
          </>
        )}

        {/* SUMMARY */}
        {phase==="summary" && (
          <div style={{ background:"#fff", borderRadius:"16px", padding:"28px", boxShadow:"0 4px 20px rgba(0,0,0,0.07)", border:"1px solid #E8F5E9" }}>
            <h2 style={{ margin:"0 0 6px", fontWeight:"900", fontSize:"24px", color:"#1B5E20", fontFamily:"'Nunito',sans-serif" }}>Briefing Overzicht</h2>
            <div style={{ height:"3px", background:`linear-gradient(90deg,${O},${OM},transparent)`, borderRadius:"2px", marginBottom:"20px" }}/>
            <div style={{ display:"flex", flexDirection:"column", gap:"5px", marginBottom:"24px" }}>
              {summaryRows.map(([label,value])=>(
                <div key={label} style={{ display:"flex", gap:"12px", padding:"8px 14px", background:"#FAFAFA", borderRadius:"8px", border:"1px solid #F1F8E9" }}>
                  <span style={{ color:"#888", fontSize:"12px", minWidth:"130px", fontWeight:"600", fontFamily:"'Nunito',sans-serif" }}>{label}</span>
                  <span style={{ color:"#333", fontSize:"12px", fontWeight:"600", flex:1, fontFamily:"'Nunito',sans-serif" }}>{value}</span>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", gap:"12px", flexWrap:"wrap" }}>
              <button onClick={generate} style={{ background:`linear-gradient(135deg,${G},${GM})`, color:"#fff", border:"none", padding:"14px 28px", borderRadius:"20px", cursor:"pointer", fontSize:"14px", fontWeight:"900", boxShadow:"0 4px 16px rgba(46,125,50,0.3)", fontFamily:"'Nunito',sans-serif" }}>⚡ Genereer Concepten</button>
              <button onClick={()=>{setPhase("steps");setStep(STEPS.length-1);}} style={{ background:"#fff", border:"1px solid #E0E0E0", color:"#666", padding:"14px 18px", borderRadius:"20px", cursor:"pointer", fontSize:"13px", fontWeight:"600", fontFamily:"'Nunito',sans-serif" }}>← Aanpassen</button>
            </div>
          </div>
        )}

        {/* GENERATING */}
        {phase==="generating" && (
          <div style={{ background:"#fff", borderRadius:"16px", padding:"40px", textAlign:"center", boxShadow:"0 4px 20px rgba(0,0,0,0.07)", border:"1px solid #E8F5E9" }}>
            <div style={{ width:"48px", height:"48px", border:`4px solid ${GL}`, borderTop:`4px solid ${G}`, borderRadius:"50%", animation:"spin 0.9s linear infinite", margin:"0 auto 20px" }}/>
            <h2 style={{ fontWeight:"900", fontSize:"22px", color:"#1B5E20", margin:"0 0 8px", fontFamily:"'Nunito',sans-serif" }}>Concepten worden gegenereerd...</h2>
            <p style={{ color:"#888", fontSize:"14px", fontFamily:"'Nunito',sans-serif" }}>AI genereert uw productvoorstellen — even geduld (~30 sec)</p>
            <div style={{ marginTop:"24px", height:"4px", background:"#E8F5E9", borderRadius:"2px", overflow:"hidden" }}>
              <div style={{ height:"100%", width:"40%", background:`linear-gradient(90deg,${G},${GM},${O})`, borderRadius:"2px", animation:"slide 1.8s ease-in-out infinite" }}/>
            </div>
          </div>
        )}

        {/* RESULTS */}
        {phase==="results" && (
          <>
            {!selectedConcept ? (
              <>
                <div style={{ marginBottom:"24px" }}>
                  <h2 style={{ fontWeight:"900", fontSize:"24px", color:"#1B5E20", margin:"0 0 4px", fontFamily:"'Nunito',sans-serif" }}>
                    {concepts.length>0 ? `${concepts.length} Productvoorstellen` : "Generatie voltooid"}
                  </h2>
                  <p style={{ color:"#888", fontSize:"13px", fontFamily:"'Nunito',sans-serif" }}>
                    {[form.category, ...form.retailer, ...form.country].filter(Boolean).join(" · ")||"Plukon NPD Pipeline 2026"} · Klik op een kaartje voor de one-pager
                  </p>
                </div>

                {apiLog && (
                  <div style={{ background:"#FFF3E0", border:`1px solid ${OM}`, borderRadius:"10px", padding:"14px 16px", marginBottom:"20px" }}>
                    <p style={{ margin:"0 0 4px", fontSize:"12px", fontWeight:"800", color:O, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Nunito',sans-serif" }}>⚠ Debug Info</p>
                    <p style={{ margin:0, fontSize:"12px", color:"#555", fontFamily:"monospace", whiteSpace:"pre-wrap" }}>{apiLog}</p>
                  </div>
                )}

                {/* Grid overview */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap:"16px", marginBottom:"24px" }}>
                  {concepts.map((c,i) => (
                    <OverviewCard key={i} concept={c} index={i} onClick={()=>{ setSelectedConcept(i); window.scrollTo(0,0); }} />
                  ))}
                </div>

                <div style={{ display:"flex", gap:"12px", flexWrap:"wrap" }}>
                  {concepts.length>0 && <button onClick={generate} style={{ background:"#fff", border:`2px solid ${G}`, color:G, padding:"11px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"13px", fontWeight:"700", fontFamily:"'Nunito',sans-serif" }}>⟳ Nieuwe variatie</button>}
                  <button onClick={()=>setPhase("summary")} style={{ background:"#fff", border:"1px solid #E0E0E0", color:"#666", padding:"11px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"13px", fontWeight:"600", fontFamily:"'Nunito',sans-serif" }}>← Briefing aanpassen</button>
                  <button onClick={reset} style={{ background:"#fff", border:"1px solid #E0E0E0", color:"#999", padding:"11px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"13px", fontWeight:"600", fontFamily:"'Nunito',sans-serif" }}>Nieuwe briefing</button>
                </div>
              </>
            ) : (
              <OnePager concept={concepts[selectedConcept]} index={selectedConcept} onBack={()=>setSelectedConcept(null)} />
            )}
          </>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<InnovationEngine/>);
</script>
</body>
</html>
